<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — Изучение языков с ИИ</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0f;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #ffffff;
            padding: 1rem;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .app-container {
            max-width: 1300px;
            width: 100%;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }
        /* Левая панель */
        .left-panel {
            flex: 2.5;
            min-width: 280px;
            background: rgba(18, 22, 35, 0.8);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.5rem;
            height: fit-content;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .logo {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #bfffc7, #7df9ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 1rem;
        }
        .streak-bar {
            background: #1a1f2e;
            border-radius: 60px;
            padding: 10px 16px;
            margin: 16px 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .streak-count {
            color: #ff9e2c;
            font-weight: bold;
        }
        .level-progress {
            margin: 12px 0;
        }
        .level-text {
            font-size: 0.8rem;
            color: #8a93b0;
            display: flex;
            justify-content: space-between;
        }
                .progress-bar {
            height: 6px;
            background: #2a2f42;
            border-radius: 10px;
            overflow: hidden;
            margin: 8px 0;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
            width: 0%;
            border-radius: 10px;
        }
        .premium-badge {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2a;
            padding: 4px 12px;
            border-radius: 60px;
            font-size: 0.7rem;
            font-weight: bold;
            margin-left: 8px;
        }
        .locked-icon {
            opacity: 0.5;
            filter: grayscale(0.3);
        }
        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 55vh;
            overflow-y: auto;
            padding-right: 6px;
        }
        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #2a2f42;
            transition: all 0.2s;
        }
        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }
        .topic-item.locked {
            opacity: 0.6;
            cursor: not-allowed;
            filter: grayscale(0.2);
        }
        .topic-status {
            width: 28px;
            height: 28px;
            background: #2a2f42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }
        .topic-status.premium {
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #1a1a2a;
        }
                .topic-name {
            flex: 1;
            font-weight: 500;
        }
        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }
        .premium-lock {
            font-size: 14px;
            color: #ffd700;
        }
        /* Правая панель */
        .right-panel {
            flex: 5;
            min-width: 320px;
            background: rgba(12, 15, 26, 0.7);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }
        /* Кнопки */
        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0a0f1a;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }
        .btn-premium {
            background: linear-gradient(95deg, #ffd700, #ffaa00);
            color: #1a1a2a;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }
        .btn-outline:hover {
            background: rgba(10, 255, 157, 0.1);
        }
                .btn-back {
            background: rgba(255, 94, 124, 0.15);
            border: 1px solid #ff5e7c;
            color: #ff9eae;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-back:hover {
            background: rgba(255, 94, 124, 0.3);
        }
        /* Чат и теория */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0f1322;
            border-radius: 24px;
            margin-bottom: 16px;
            max-height: 450px;
        }
        .message {
            margin-bottom: 12px;
            padding: 14px 18px;
            border-radius: 20px;
            background: #1a2035;
            border: 1px solid #2a2f42;
            color: #fff;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin: 12px 0 16px;
        }
        .topic-btn {
            background: #0f1322;
            border: 1px solid #0aff9d;
            border-radius: 40px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #0aff9d;
            font-weight: 500;
        }
        .topic-btn:hover {
            background: #0aff9d20;
        }
                /* Практика */
        .practice-question {
            background: #11161f;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }
        .practice-input {
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 12px 0;
            font-size: 1rem;
        }
        .practice-input:focus {
            outline: none;
            border-color: #0aff9d;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin: 12px 0;
        }
        .option {
            background: #0f141c;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2c3a4a;
            text-align: center;
            transition: 0.2s;
        }
        .option:hover {
            border-color: #0aff9d;
            background: #1a2a2f;
        }
        .selected {
            background: #0aff9d20;
            border-color: #0aff9d;
            color: #ccffdd;
        }
        .feedback-correct {
            color: #0aff9d;
            margin-top: 12px;
            padding: 10px;
            background: rgba(10, 255, 157, 0.1);
            border-radius: 16px;
        }
        .feedback-wrong {
            color: #ff5e7c;
            margin-top: 12px;
            padding: 10px;
            background: rgba(255, 94, 124, 0.1);
            border-radius: 16px;
        }
                .practice-footer {
            display: flex;
            gap: 12px;
            margin-top: 12px;
            justify-content: space-between;
        }
        /* Магазин и премиум */
        .shop-item {
            background: #111624;
            border-radius: 20px;
            padding: 16px;
            margin-bottom: 12px;
            border: 1px solid #2a2f42;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .price {
            color: #ffd700;
            font-weight: bold;
        }
        .coin-icon {
            color: #ffd700;
            margin-right: 4px;
        }
        /* Ачивки */
        .achievement-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 12px;
            margin: 16px 0;
        }
        .achievement-card {
            background: #0f1322;
            border-radius: 20px;
            padding: 12px;
            text-align: center;
            border: 1px solid #2a2f42;
        }
        .achievement-card.unlocked {
            border-color: #ffd700;
            background: rgba(255, 215, 0, 0.1);
        }
        /* Уведомления */
        .notification {
            position: fixed;
            bottom: 20px;
            right: 20px;
            background: #1a2035;
            border-left: 4px solid #0aff9d;
            padding: 12px 20px;
            border-radius: 12px;
            z-index: 1000;
            animation: slideIn 0.3s ease;
        }
                @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        /* Табы */
        .tab-switch {
            display: flex;
            gap: 8px;
            margin: 16px 0;
        }
        .tab-btn {
            background: #0f1322;
            border: 1px solid #2a2f42;
            border-radius: 40px;
            padding: 8px 20px;
            cursor: pointer;
            font-weight: 500;
            flex: 1;
            text-align: center;
        }
        .tab-btn.active {
            background: #0aff9d;
            color: #0a0f1a;
            border-color: #0aff9d;
        }
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #1a2035;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb {
            background: #0aff9d;
            border-radius: 10px;
        }
        @media (max-width: 780px) {
            .app-container { flex-direction: column; }
            .practice-footer { flex-direction: column; }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>
<script>
    // ==================== ДАННЫЕ ПОЛЬЗОВАТЕЛЯ ====================
    let userCoins = JSON.parse(localStorage.getItem("aevi_coins")) || 150;
    let userStreak = JSON.parse(localStorage.getItem("aevi_streak")) || 0;
        let lastActiveDate = localStorage.getItem("aevi_last_active") || null;
    let isPremium = JSON.parse(localStorage.getItem("aevi_premium")) || false;
    let userLevel = JSON.parse(localStorage.getItem("aevi_user_level")) || 1;
    let userXp = JSON.parse(localStorage.getItem("aevi_xp")) || 0;
    let completedLessons = JSON.parse(localStorage.getItem("aevi_completed")) || [];
    let unlockedTopics = JSON.parse(localStorage.getItem("aevi_unlocked")) || ["g1"];
    let achievements = JSON.parse(localStorage.getItem("aevi_achievements")) || [];
    let dailyChallengeCompleted = JSON.parse(localStorage.getItem("aevi_daily")) || false;
    
    // ==================== ГРАММАТИЧЕСКИЕ ТЕМЫ ====================
    const grammarTopics = [
        { id: "g1", name: "Глагол TO BE (am/is/are)", premium: false, xpReward: 50, coinsReward: 20 },
        { id: "g2", name: "Present Simple (I work)", premium: false, xpReward: 60, coinsReward: 25 },
        { id: "g3", name: "Present Continuous (I am doing)", premium: false, xpReward: 60, coinsReward: 25 },
        { id: "g4", name: "Модальный глагол CAN", premium: false, xpReward: 50, coinsReward: 20 },
        { id: "g5", name: "Past Simple (was/were)", premium: false, xpReward: 70, coinsReward: 30 },
        { id: "g6", name: "Future: to be going to", premium: true, xpReward: 80, coinsReward: 40 },
        { id: "g7", name: "Present Perfect", premium: true, xpReward: 100, coinsReward: 50 },
        { id: "g8", name: "Conditionals (if)", premium: true, xpReward: 120, coinsReward: 60 }
    ];
    
    // ==================== ТЕОРИЯ ДЛЯ ПЕРВОГО УРОКА ====================
    const theoryDB = {
        "g1": {
            full: `Глагол TO BE (am/is/are)

1. Значение: "быть, находиться, являться"
2. Формы: I am / He/She/It is / You/We/They are
3. Утверждение: I am a student.
4. Отрицание: I am not tired.
5. Вопрос: Are you ready?`,
            examples: `Примеры:
1. I am a teacher.
2. She is a doctor.
3. They are happy.
4. You are my friend.`,
            negative: `Отрицание:
I am not (I'm not)
He is not (isn't)
They are not (aren't)`,
            questions: `Вопросы:
Am I late?
Is she a doctor?
Are you ready?`
        }
    };
    
    // ==================== ПРАКТИКА ДЛЯ ПЕРВОГО УРОКА ====================
    const practiceTasks = {
        "g1": [
            { type: "input", question: "She ___ a doctor.", correct: "is", hint: "She + is" },
            { type: "input", question: "I ___ happy.", correct: "am", hint: "I + am" },
            { type: "input", question: "They ___ at home.", correct: "are", hint: "They + are" },
            { type: "input", question: "He ___ not tired.", correct: "is", hint: "He is not" },
            { type: "choice", question: "___ you ready?", options: ["Am", "Is", "Are"], correct: "Are", hint: "Вопрос с you" },
            { type: "choice", question: "___ she a doctor?", options: ["Am", "Is", "Are"], correct: "Is", hint: "Вопрос с she" },
            { type: "translate", question: "Переведите: 'Я студент'", correct: "i am a student", hint: "I am a student" },
            { type: "translate", question: "Переведите: 'Они счастливы'", correct: "they are happy", hint: "They are happy" }
        ]
    };
        // ==================== АЧИВКИ ====================
    const achievementsList = [
        { id: "first_lesson", name: "Первый урок", desc: "Завершите первый урок", icon: "🎓", unlocked: false, reward: 50 },
        { id: "streak_7", name: "7 дней подряд", desc: "Занимайтесь 7 дней без пропусков", icon: "🔥", unlocked: false, reward: 100 },
        { id: "streak_30", name: "Месяц учёбы", desc: "30 дней подряд", icon: "🏆", unlocked: false, reward: 500, premium: true },
        { id: "words_50", name: "Слово за словом", desc: "Выучите 50 слов", icon: "📖", unlocked: false, reward: 75 }
    ];
    
    // ==================== ЕЖЕДНЕВНЫЙ ЧЕЛЛЕНДЖ ====================
    let dailyChallenge = {
        task: "Выполните 5 заданий практики",
        progress: 0,
        target: 5,
        reward: 30,
        completed: false
    };
    
    // ==================== СОСТОЯНИЕ ПРИЛОЖЕНИЯ ====================
    let currentTab = "grammar";
    let currentTopic = null;
    let currentMode = "topics";
    let chatMessages = [];
    let currentTasks = [];
    let currentTaskIdx = 0;
    let userAnswers = [];
    let results = [];
    let showFeedback = false;
    let feedbackMessage = "";
    let activeAchievement = null;
    
    // ==================== ФУНКЦИИ СОХРАНЕНИЯ ====================
    function saveAll() {
        localStorage.setItem("aevi_coins", JSON.stringify(userCoins));
        localStorage.setItem("aevi_streak", JSON.stringify(userStreak));
        localStorage.setItem("aevi_premium", JSON.stringify(isPremium));
        localStorage.setItem("aevi_user_level", JSON.stringify(userLevel));
        localStorage.setItem("aevi_xp", JSON.stringify(userXp));
        localStorage.setItem("aevi_completed", JSON.stringify(completedLessons));
        localStorage.setItem("aevi_unlocked", JSON.stringify(unlockedTopics));
        localStorage.setItem("aevi_achievements", JSON.stringify(achievements));
        localStorage.setItem("aevi_daily", JSON.stringify(dailyChallengeCompleted));
        if (lastActiveDate) localStorage.setItem("aevi_last_active", lastActiveDate);
    }
        // ==================== СТРИК И XP ====================
    function updateStreak() {
        const today = new Date().toDateString();
        if (lastActiveDate !== today) {
            const yesterday = new Date();
            yesterday.setDate(yesterday.getDate() - 1);
            if (lastActiveDate === yesterday.toDateString()) {
                userStreak++;
                showNotification(`🔥 Серия: ${userStreak} дней!`, "streak");
            } else if (lastActiveDate !== today) {
                userStreak = 1;
                showNotification("Начинаем новую серию!", "info");
            }
            lastActiveDate = today;
            saveAll();
            renderApp();
        }
    }
    
    function addXp(amount) {
        userXp += amount;
        let newLevel = Math.floor(userXp / 500) + 1;
        if (newLevel > userLevel) {
            userLevel = newLevel;
            showNotification(`Поздравляем! Вы достигли ${userLevel} уровня!`, "levelup");
        }
        saveAll();
        renderApp();
    }
    
    function addCoins(amount) {
        userCoins += amount;
        showNotification(`+${amount} монет!`, "coins");
        saveAll();
        renderApp();
    }
    
    function showNotification(message, type) {
        const notif = document.createElement("div");
        notif.className = "notification";
        notif.innerHTML = message;
        document.body.appendChild(notif);
        setTimeout(() => notif.remove(), 3000);
    }
        // ==================== РАЗБЛОКИРОВКА И АЧИВКИ ====================
    function unlockTopic(topicId) {
        if (!unlockedTopics.includes(topicId)) {
            const topic = grammarTopics.find(t => t.id === topicId);
            if (topic && topic.premium && !isPremium) {
                if (userCoins >= 200) {
                    userCoins -= 200;
                    unlockedTopics.push(topicId);
                    showNotification(`Тема "${topic.name}" разблокирована за 200 монет!`, "unlock");
                    saveAll();
                    renderApp();
                    return true;
                } else {
                    showNotification(`Нужно 200 монет или Premium для разблокировки "${topic.name}"`, "error");
                    return false;
                }
            } else if (!topic.premium) {
                unlockedTopics.push(topicId);
                saveAll();
                renderApp();
                return true;
            }
        }
        return false;
    }
    
    function checkAchievements() {
        achievementsList.forEach(ach => {
            if (!achievements.includes(ach.id)) {
                let earned = false;
                if (ach.id === "first_lesson" && completedLessons.length >= 1) earned = true;
                if (ach.id === "streak_7" && userStreak >= 7) earned = true;
                if (ach.id === "streak_30" && userStreak >= 30 && !ach.premium) earned = true;
                if (ach.id === "words_50" && completedLessons.length >= 3) earned = true;
                if (earned) {
                    achievements.push(ach.id);
                    addCoins(ach.reward);
                    showNotification(`🏆 Ачивка получена: ${ach.name}! +${ach.reward} монет`, "achievement");
                }
            }
        });
        saveAll();
    }
        // ==================== ФУНКЦИИ ПРАКТИКИ ====================
    function startPractice(topicId) {
        currentTasks = [...(practiceTasks[topicId] || practiceTasks.g1)];
        currentTaskIdx = 0;
        userAnswers = new Array(currentTasks.length).fill(null);
        results = new Array(currentTasks.length).fill(false);
        currentMode = "practice";
        showFeedback = false;
        renderApp();
    }
    
    function checkAnswer(answer) {
        const task = currentTasks[currentTaskIdx];
        const isCorrect = (answer.trim().toLowerCase() === task.correct.toLowerCase());
        userAnswers[currentTaskIdx] = answer;
        results[currentTaskIdx] = isCorrect;
        
        if (isCorrect) {
            feedbackMessage = `✅ Правильно! ${task.hint || ""}`;
            if (dailyChallenge.task.includes("заданий") && dailyChallenge.progress < dailyChallenge.target) {
                dailyChallenge.progress++;
                if (dailyChallenge.progress >= dailyChallenge.target && !dailyChallenge.completed) {
                    dailyChallenge.completed = true;
                    addCoins(dailyChallenge.reward);
                    showNotification(`Ежедневный челлендж выполнен! +${dailyChallenge.reward} монет`, "challenge");
                    dailyChallengeCompleted = true;
                    saveAll();
                }
                renderApp();
            }
        } else {
            feedbackMessage = `❌ Неправильно. Правильный ответ: ${task.correct}. ${task.hint || ""}`;
        }
        showFeedback = true;
        
        setTimeout(() => {
            showFeedback = false;
            if (currentTaskIdx + 1 < currentTasks.length) {
                currentTaskIdx++;
                renderApp();
            } else {
                finishPractice();
            }
        }, 1500);
        
        renderApp();
    }
        function finishPractice() {
        const correctCount = results.filter(r => r === true).length;
        const percent = (correctCount / currentTasks.length) * 100;
        const topic = grammarTopics.find(t => t.id === currentTopic);
        
        if (percent >= 70 && topic && !completedLessons.includes(topic.id)) {
            completedLessons.push(topic.id);
            addXp(topic.xpReward);
            addCoins(topic.coinsReward);
            checkAchievements();
            if (topic.id === "g1") unlockTopic("g2");
            if (topic.id === "g2") unlockTopic("g3");
            if (topic.id === "g3") { unlockTopic("g4"); unlockTopic("g5"); }
            showNotification(`Урок пройден! +${topic.xpReward} XP, +${topic.coinsReward} монет`, "complete");
        }
        currentMode = "results";
        renderApp();
    }
    
    function buyPremium() {
        if (userCoins >= 500) {
            userCoins -= 500;
            isPremium = true;
            saveAll();
            showNotification("Premium активирован! Все темы открыты", "premium");
            renderApp();
        } else {
            showNotification(`Не хватает монет. Нужно 500. У вас ${userCoins}`, "error");
        }
    }
    
    function resetDailyChallenge() {
        const today = new Date().toDateString();
        if (lastActiveDate !== today) {
            dailyChallenge = {
                task: "Выполните 5 заданий практики",
                progress: 0,
                target: 5,
                reward: 30,
                completed: false
            };
            dailyChallengeCompleted = false;
            saveAll();
        }
    }
        // ==================== ОСНОВНОЙ РЕНДЕР ====================
    function renderApp() {
        resetDailyChallenge();
        updateStreak();
        
        const container = document.getElementById('app');
        if (!container) return;
        
        const totalTopics = grammarTopics.length;
        const unlockedCount = unlockedTopics.length;
        const completedCount = completedLessons.length;
        const nextXpNeeded = 500 - (userXp % 500);
        
        const topicsHtml = grammarTopics.map(topic => {
            const isUnlocked = unlockedTopics.includes(topic.id);
            const isCompleted = completedLessons.includes(topic.id);
            const isLocked = !isUnlocked;
            const lockedClass = isLocked ? 'locked' : '';
            const completedClass = isCompleted ? 'completed' : '';
            const premiumBadge = topic.premium && !isUnlocked && !isPremium ? '<span class="premium-lock">🔒 Premium</span>' : '';
            const lockIcon = isLocked && !topic.premium ? '<span class="premium-lock">🔒</span>' : '';
            
            return `
                <div class="topic-item ${completedClass} ${lockedClass}" data-id="${topic.id}" data-premium="${topic.premium}">
                    <div class="topic-status ${topic.premium && !isUnlocked ? 'premium' : ''}">${isCompleted ? '✓' : (isUnlocked ? (parseInt(topic.id.slice(1)) || 1) : '🔒')}</div>
                    <div class="topic-name">${topic.name}</div>
                    <div class="topic-badge">${premiumBadge || lockIcon || 'грамматика'}</div>
                </div>
            `;
        }).join('');
        
        const xpPercent = (userXp % 500) / 500 * 100;
                let rightPanelHtml = '';
        
        if (currentMode === "topics") {
            rightPanelHtml = `
                <div class="chat-container">
                    <h2 style="margin-bottom: 16px;">Добро пожаловать в Aevi</h2>
                    <p style="color: #8a93b0; margin-bottom: 20px;">Выберите тему слева, чтобы начать обучение.</p>
                    <div class="shop-item">
                        <div>
                            <strong>⭐ Premium доступ</strong>
                            <div style="font-size: 12px; color: #8a93b0;">Все темы + эксклюзивные ачивки</div>
                        </div>
                        <div>
                            ${!isPremium ? `<button class="btn-outline" id="premiumBuyBtn" style="padding: 6px 16px;">${userCoins >= 500 ? 'Купить за 500' : '500 монет'}</button>` : '<span class="premium-badge">PREMIUM</span>'}
                        </div>
                    </div>
                    ${!dailyChallenge.completed ? `
                    <div class="shop-item">
                        <div>
                            <strong>📅 Ежедневный челлендж</strong>
                            <div style="font-size: 12px; color: #8a93b0;">${dailyChallenge.task} (${dailyChallenge.progress}/${dailyChallenge.target})</div>
                        </div>
                        <div class="price">+${dailyChallenge.reward} 🪙</div>
                    </div>
                    ` : '<div class="shop-item"><div><strong>✅ Челлендж выполнен!</strong></div><div>+30 🪙 получено</div></div>'}
                    <div class="achievement-grid" style="margin-top: 20px;">
                        <h4>🏆 Достижения</h4>
                        ${achievementsList.map(ach => {
                            const isUnlocked = achievements.includes(ach.id);
                            return `
                                <div class="achievement-card ${isUnlocked ? 'unlocked' : ''}">
                                    <div style="font-size: 24px;">${ach.icon}</div>
                                    <div style="font-size: 12px; font-weight: bold;">${ach.name}</div>
                                    <div style="font-size: 10px; color: #8a93b0;">${ach.desc}</div>
                                    ${!isUnlocked && ach.premium && !isPremium ? '<div style="font-size: 10px; color: #ffd700;">Premium</div>' : ''}
                                </div>
                            `;
                        }).join('')}
                    </div>
                </div>
            `;
        }
                else if (currentMode === "chat" && currentTopic) {
            const topic = grammarTopics.find(t => t.id === currentTopic);
            const theory = theoryDB[currentTopic];
            const messagesHtml = chatMessages.map(msg => `<div class="message">${msg.content}</div>`).join('');
            
            rightPanelHtml = `
                <div class="chat-container">
                    <div style="display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;">
                        <h2>${topic.name}</h2>
                        <button class="btn-outline" id="practiceBtn">📝 Практика</button>
                        <button class="btn-back" id="backBtn">← Назад</button>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        ${messagesHtml}
                    </div>
                    <div class="button-panel">
                        <button class="topic-btn" data-type="full">📖 Теория</button>
                        <button class="topic-btn" data-type="examples">📋 Примеры</button>
                        <button class="topic-btn" data-type="negative">❌ Отрицание</button>
                        <button class="topic-btn" data-type="questions">❓ Вопросы</button>
                    </div>
                </div>
            `;
        }
        else if (currentMode === "practice" && currentTasks.length) {
            const task = currentTasks[currentTaskIdx];
            const optionsHtml = task.type === "choice" ? 
                `<div class="options">${task.options.map(opt => `<div class="option" data-val="${opt}">${opt}</div>`).join('')}</div>` : '';
            
            rightPanelHtml = `
                <div class="practice-block">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 16px;">
                        <h3>Практика: ${grammarTopics.find(t => t.id === currentTopic)?.name}</h3>
                        <span>${currentTaskIdx+1}/${currentTasks.length}</span>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width: ${(currentTaskIdx/currentTasks.length)*100}%"></div></div>
                    <div class="practice-question">
                        <strong>${task.question}</strong>
                        ${optionsHtml}
                        ${task.type !== "choice" ? `<input type="text" id="answerInput" class="practice-input" placeholder="Введите ответ...">` : ''}
                        ${showFeedback ? `<div class="${feedbackMessage.includes('✅') ? 'feedback-correct' : 'feedback-wrong'}">${feedbackMessage}</div>` : ''}
                        <div class="practice-footer">
                            <button class="btn-back" id="backToChatBtn">← К теории</button>
                            <button class="btn" id="submitBtn">Проверить</button>
                        </div>
                    </div>
                </div>
            `;
        }
                else if (currentMode === "results") {
            const correctCount = results.filter(r => r === true).length;
            const percent = Math.round((correctCount / currentTasks.length) * 100);
            const topic = grammarTopics.find(t => t.id === currentTopic);
            const isCompleted = completedLessons.includes(currentTopic);
            
            rightPanelHtml = `
                <div class="results-block">
                    <h2>Результаты практики</h2>
                    <div style="text-align: center; margin: 40px 0;">
                        <div style="font-size: 48px; font-weight: bold; color: #0aff9d;">${correctCount}/${currentTasks.length}</div>
                        <div style="font-size: 18px;">${percent}% правильно</div>
                        ${!isCompleted && percent >= 70 ? '<div style="color: #ffd700; margin-top: 12px;">+50 XP, +20 монет</div>' : ''}
                    </div>
                    <div class="progress"><div class="progress-fill" style="width: ${percent}%"></div></div>
                    ${percent >= 70 ? '<p style="margin: 20px 0; text-align: center;">Тема пройдена! Отличная работа.</p>' : '<p style="margin: 20px 0; text-align: center;">Повторите тему и попробуйте снова.</p>'}
                    <button class="btn" id="backToChatBtn">Вернуться к теории</button>
                </div>
            `;
        }
        
        container.innerHTML = `
            <div class="left-panel">
                <div class="logo">Aevi</div>
                <div class="streak-bar">
                    <span>🔥 Серия</span>
                    <span class="streak-count">${userStreak} дней</span>
                </div>
                <div class="level-progress">
                    <div class="level-text"><span>Уровень ${userLevel}</span><span>${userXp % 500}/${500} XP</span></div>
                    <div class="progress-bar"><div class="progress-fill" style="width: ${xpPercent}%"></div></div>
                </div>
                <div class="streak-bar" style="margin-top: 8px;">
                    <span>🪙 Монеты</span>
                    <span class="streak-count">${userCoins}</span>
                    ${!isPremium ? '<button class="btn-outline" id="premiumBuyBtn2" style="padding: 4px 12px; font-size: 12px;">Premium</button>' : '<span class="premium-badge">PREMIUM</span>'}
                </div>
                <div class="tab-switch">
                    <div class="tab-btn active">📖 Грамматика</div>
                    <div class="tab-btn" style="opacity:0.5; cursor:not-allowed;">📚 Лексика (скоро)</div>
                </div>
                <div class="topic-list" id="topicList">${topicsHtml}</div>
            </div>
            <div class="right-panel" id="rightPanel">${rightPanelHtml}</div>
        `;
                // Обработчики для тем
        document.querySelectorAll('.topic-item').forEach(el => {
            el.addEventListener('click', () => {
                const topicId = el.dataset.id;
                const isPremiumTopic = el.dataset.premium === 'true';
                const isUnlocked = unlockedTopics.includes(topicId);
                
                if (!isUnlocked) {
                    if (isPremiumTopic && !isPremium) {
                        if (userCoins >= 200) {
                            if (confirm(`Разблокировать тему за 200 монет?`)) {
                                userCoins -= 200;
                                unlockedTopics.push(topicId);
                                saveAll();
                                showNotification(`Тема разблокирована!`, "unlock");
                                renderApp();
                            }
                        } else {
                            showNotification(`Не хватает монет. Нужно 200. Купите Premium за 500 монет, чтобы открыть все темы.`, "error");
                        }
                    }
                    return;
                }
                
                currentTopic = topicId;
                chatMessages = [{ content: `Вы выбрали тему: ${grammarTopics.find(t => t.id === topicId)?.name}. Нажмите на кнопку, чтобы получить информацию.` }];
                currentMode = "chat";
                renderApp();
            });
        });
        
        // Кнопки назад
        document.getElementById('backBtn')?.addEventListener('click', () => {
            currentMode = "topics";
            currentTopic = null;
            renderApp();
        });
        
        document.getElementById('backToChatBtn')?.addEventListener('click', () => {
            currentMode = "chat";
            renderApp();
        });
        
        // Кнопка практики
        document.getElementById('practiceBtn')?.addEventListener('click', () => {
            startPractice(currentTopic);
        });
                // Кнопки теории
        document.querySelectorAll('.topic-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const theory = theoryDB[currentTopic];
                if (theory && theory[type]) {
                    chatMessages.push({ content: theory[type] });
                    renderApp();
                }
            });
        });
        
        // Кнопка проверки ответа
        document.getElementById('submitBtn')?.addEventListener('click', () => {
            if (currentTasks[currentTaskIdx].type === 'choice') {
                const selected = document.querySelector('.option.selected');
                if (selected) checkAnswer(selected.dataset.val);
            } else {
                const input = document.getElementById('answerInput');
                if (input && input.value.trim()) checkAnswer(input.value.trim());
            }
        });
        
        // Выбор варианта в choice
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
        
        // Кнопки покупки Premium
        document.getElementById('premiumBuyBtn')?.addEventListener('click', buyPremium);
        document.getElementById('premiumBuyBtn2')?.addEventListener('click', buyPremium);
        
        // Скролл чата вниз
        const chatMessagesDiv = document.getElementById('chatMessages');
        if (chatMessagesDiv) chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
    }
    
    // ==================== ЗАПУСК ПРИЛОЖЕНИЯ ====================
    updateStreak();
    renderApp();
</script>
</body>
</html>
