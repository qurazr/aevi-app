<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Aevi | Language Learning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      color: #eef5ff;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .app-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: rgba(15, 20, 30, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(10, 255, 157, 0.3);
      border-radius: 28px;
      padding: 1.8rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px rgba(10, 255, 157, 0.2);
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #a0f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      color: #9aaebf;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      background: #0f141c;
      padding: 12px 18px;
      border-radius: 40px;
      cursor: pointer;
      border: 1px solid #2c3a4a;
      transition: all 0.2s;
      text-align: center;
    }

    .option:hover {
      border-color: #0aff9d;
      background: #1a2a2f;
      box-shadow: 0 0 6px #0aff9d;
    }

    .selected {
      background: #0aff9d20;
      border-color: #0aff9d;
      color: #ccffdd;
      box-shadow: 0 0 10px #0aff9d40;
    }

    .btn {
      background: linear-gradient(95deg, #0aff9d, #00c3ff);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1rem;
      width: 100%;
    }

    .btn-secondary {
      background: linear-gradient(95deg, #ff5e7c, #ff9eae);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
      width: 100%;
    }

    .btn-small {
      background: linear-gradient(95deg, #0aff9d, #00c3ff);
      border: none;
      padding: 8px 16px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover, .btn-small:hover, .btn-secondary:hover {
      transform: scale(0.98);
      box-shadow: 0 0 18px #0aff9d;
    }

    .lang-select {
      background: #0f141c;
      border: 1px solid #2c3a4a;
      border-radius: 60px;
      padding: 12px 20px;
      width: 100%;
      color: white;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .progress {
      margin: 20px 0 10px;
      height: 6px;
      background: #1e2a32;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0aff9d, #00c3ff);
      box-shadow: 0 0 5px #0aff9d;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    .word-item {
      background: #0b1018;
      padding: 12px 18px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      border-left: 4px solid #0aff9d;
    }

    .practice-question {
      background: #11161f;
      border-radius: 24px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }

    .practice-input {
      background: #0a0f16;
      border: 1px solid #2a3a4a;
      border-radius: 40px;
      padding: 12px 18px;
      width: 100%;
      color: white;
      margin: 12px 0;
      font-size: 1rem;
    }

    .result-badge {
      margin-top: 12px;
      font-size: 0.85rem;
    }

    .correct {
      color: #0aff9d;
    }

    .wrong {
      color: #ff5e7c;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0aff9d;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    .level-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.75rem;
      font-weight: 600;
      margin-left: 8px;
    }

    .level-A1 { background: #4caf50; color: white; }
    .level-A2 { background: #8bc34a; color: black; }
    .level-B1 { background: #ffc107; color: black; }
    .level-B2 { background: #ff9800; color: black; }
    .level-C1 { background: #f44336; color: white; }
    .level-C2 { background: #9c27b0; color: white; }

    @media (max-width: 600px) {
      .card { padding: 1.2rem; }
      h2 { font-size: 1.4rem; }
      .btn, .btn-small, .btn-secondary { width: 100%; }
      .button-group { flex-direction: column; gap: 0.5rem; }
      .word-item { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main id="app"></main>
  </div>

  <script>
    (function() {
      // ==================== POLYFILLS ДЛЯ СТАРЫХ БРАУЗЕРОВ ====================
      if (!String.prototype.trim) {
        String.prototype.trim = function() {
          return this.replace(/^[\s\uFEFF\xA0]+|[\s\uFEFF\xA0]+$/g, '');
        };
      }
      
      // ==================== БАЗА ЗНАНИЙ ====================
      var vocabularyDB = {
        A1: [
          { word: "hello", translation: "привет", examples: ["Hello, how are you?"] },
          { word: "goodbye", translation: "до свидания", examples: ["Goodbye, see you later!"] },
          { word: "please", translation: "пожалуйста", examples: ["Please help me."] },
          { word: "thank you", translation: "спасибо", examples: ["Thank you very much!"] },
          { word: "yes", translation: "да", examples: ["Yes, I agree."] },
          { word: "no", translation: "нет", examples: ["No, thank you."] },
          { word: "cat", translation: "кот", examples: ["I have a cat."] },
          { word: "dog", translation: "собака", examples: ["The dog is barking."] },
          { word: "house", translation: "дом", examples: ["My house is big."] },
          { word: "car", translation: "машина", examples: ["She drives a car."] }
        ],
        A2: [
          { word: "beautiful", translation: "красивый", examples: ["The view is beautiful."] },
          { word: "important", translation: "важный", examples: ["It's important to study."] },
          { word: "different", translation: "разный", examples: ["We have different opinions."] },
          { word: "interesting", translation: "интересный", examples: ["That's interesting!"] },
          { word: "delicious", translation: "вкусный", examples: ["The food is delicious."] }
        ],
        B1: [
          { word: "therefore", translation: "следовательно", examples: ["He studied hard; therefore, he passed."] },
          { word: "although", translation: "хотя", examples: ["Although it rained, we went out."] },
          { word: "develop", translation: "развивать", examples: ["We need to develop new skills."] },
          { word: "achieve", translation: "достигать", examples: ["You can achieve your goals."] }
        ],
        B2: [
          { word: "nevertheless", translation: "тем не менее", examples: ["It was difficult; nevertheless, we succeeded."] },
          { word: "consequently", translation: "следовательно", examples: ["He missed the train; consequently, he was late."] }
        ],
        C1: [
          { word: "ubiquitous", translation: "вездесущий", examples: ["Smartphones are ubiquitous nowadays."] },
          { word: "mitigate", translation: "смягчать", examples: ["We need to mitigate the risks."] }
        ],
        C2: [
          { word: "ephemeral", translation: "эфемерный", examples: ["Fame is often ephemeral."] },
          { word: "cogent", translation: "убедительный", examples: ["He presented a cogent argument."] }
        ]
      };
      
      var allLevels = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
      
      // Тестовые вопросы для определения уровня (20 вопросов)
      var placementTest = [
        { text: "I ___ to school every day.", options: ["go", "goes", "going", "went"], correct: "go", level: "A1" },
        { text: "She ___ a doctor.", options: ["am", "is", "are", "be"], correct: "is", level: "A1" },
        { text: "___ you like ice cream?", options: ["Does", "Do", "Is", "Are"], correct: "Do", level: "A1" },
        { text: "What ___ you doing yesterday?", options: ["are", "were", "was", "is"], correct: "were", level: "A2" },
        { text: "If I ___ you, I would go.", options: ["was", "were", "am", "is"], correct: "were", level: "B1" },
        { text: "She ___ to Paris last year.", options: ["go", "went", "gone", "goes"], correct: "went", level: "A2" },
        { text: "I have ___ that movie before.", options: ["see", "saw", "seen", "seeing"], correct: "seen", level: "B1" },
        { text: "By next year, I ___ this book.", options: ["will finish", "will have finished", "finish", "finished"], correct: "will have finished", level: "B2" },
        { text: "The meeting ___ postponed because of the rain.", options: ["was", "were", "is", "are"], correct: "was", level: "B1" },
        { text: "She advised that he ___ earlier.", options: ["arrive", "arrives", "arrived", "has arrived"], correct: "arrive", level: "C1" },
        { text: "Had I known, I ___ earlier.", options: ["would come", "would have come", "came", "come"], correct: "would have come", level: "C1" },
        { text: "The ___ of the project was impressive.", options: ["outcome", "outcoming", "comed out", "comeout"], correct: "outcome", level: "B2" },
        { text: "She is ___ in the class.", options: ["the most intelligent", "more intelligent", "intelligenter", "most intelligent"], correct: "the most intelligent", level: "B1" },
        { text: "If only I ___ more time!", options: ["had", "have", "would have", "had had"], correct: "had", level: "B2" },
        { text: "He ___ his homework when I called.", options: ["did", "was doing", "has done", "does"], correct: "was doing", level: "B1" },
        { text: "Not until the end ___ he realize the truth.", options: ["did", "had", "was", "has"], correct: "did", level: "C1" },
        { text: "She is looking forward ___ her family.", options: ["to see", "to seeing", "seeing", "see"], correct: "to seeing", level: "B2" },
        { text: "The more you practice, ___ you become.", options: ["better", "the better", "more better", "best"], correct: "the better", level: "B1" },
        { text: "I wish I ___ taller.", options: ["were", "was", "am", "is"], correct: "were", level: "B2" },
        { text: "His argument was so cogent that ___ could refute it.", options: ["anyone", "no one", "someone", "everyone"], correct: "no one", level: "C2" }
      ];
      
      // ==================== СОСТОЯНИЕ ====================
      var step = 'modeSelect'; // modeSelect, levelTest, manualLevel, lesson
      var mode = null; // 'test' или 'manual'
      var userLevel = null;
      var currentLang = 'English';
      var testAnswers = [];
      var testResults = null;
      var wrongWords = []; // слова, в которых были ошибки
      var currentLesson = null;
      var practiceAnswers = [];
      var practiceResults = [];
      var practiceIndex = 0;
      var currentTestIndex = 0;
      
      // ==================== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ====================
      function shuffleArray(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }
      
      function getLevelFromScore(score, total) {
        var percent = (score / total) * 100;
        if (percent < 30) return 'A1';
        if (percent < 50) return 'A2';
        if (percent < 65) return 'B1';
        if (percent < 80) return 'B2';
        if (percent < 90) return 'C1';
        return 'C2';
      }
      
      // Генерация урока (учитывает ошибочные слова)
      function generateLesson(lang, level, mistakes) {
        var vocab = [];
        var levelsList = allLevels.slice();
        var levelIndex = levelsList.indexOf(level);
        
        // Добавляем слова из текущего уровня
        var currentVocab = vocabularyDB[level] || vocabularyDB.A1;
        for (var i = 0; i < currentVocab.length; i++) {
          vocab.push(currentVocab[i]);
        }
        
        // Добавляем слова из прошлых уровней, в которых были ошибки
        for (var m = 0; m < mistakes.length; m++) {
          var mistakeWord = mistakes[m];
          var found = false;
          for (var v = 0; v < vocab.length; v++) {
            if (vocab[v].word === mistakeWord.word) found = true;
          }
          if (!found) vocab.push(mistakeWord);
        }
        
        // Добавляем немного слов из следующего уровня (для прогресса)
        if (levelIndex + 1 < levelsList.length) {
          var nextVocab = vocabularyDB[levelsList[levelIndex + 1]];
          if (nextVocab) {
            for (var n = 0; n < Math.min(2, nextVocab.length); n++) {
              vocab.push(nextVocab[n]);
            }
          }
        }
        
        var theory = getTheory(lang, level);
        var tasks = generateTasks(vocab, level, lang);
        
        return { theory: theory, vocabulary: vocab, tasks: tasks };
      }
      
      function getTheory(lang, level) {
        var theories = {
          English: {
            A1: '📘 <strong>Основы английского (A1)</strong><br><br>Порядок слов SVO. Глагол to be: I am / you are / he is. Артикли a/an/the.',
            A2: '📗 <strong>Начальный уровень (A2)</strong><br><br>Прошедшее время Past Simple. Правильные и неправильные глаголы.',
            B1: '📙 <strong>Средний уровень (B1)</strong><br><br>Present Perfect. Условные предложения 0 и 1 типа.',
            B2: '📕 <strong>Выше среднего (B2)</strong><br><br>Пассивный залог. Сложные времена. Модальные глаголы.',
            C1: '📔 <strong>Продвинутый (C1)</strong><br><br>Инверсия. Сослагательное наклонение. Фразовые глаголы.',
            C2: '📚 <strong>Профессиональный (C2)</strong><br><br>Стилистические приёмы. Идиомы. Сложные конструкции.'
          },
          Spanish: {
            A1: '📘 <strong>Основы испанского (A1)</strong><br><br>SER и ESTAR. Спряжение глаголов AR/ER/IR.',
            B1: '📙 <strong>Средний испанский (B1)</strong><br><br>Pretérito Perfecto. Субхунтив.',
            C1: '📕 <strong>Продвинутый испанский (C1)</strong><br><br>Сложные времена. Идиоматические выражения.'
          },
          French: {
            A1: '📘 <strong>Основы французского (A1)</strong><br><br>Глаголы ER. Спряжение être и avoir.',
            B1: '📙 <strong>Средний французский (B1)</strong><br><br>Passé Composé. Futur Simple.',
            C1: '📕 <strong>Продвинутый французский (C1)</strong><br><br>Subjonctif. Conditionnel passé.'
          },
          German: {
            A1: '📘 <strong>Основы немецкого (A1)</strong><br><br>Артикли der/die/das. Порядок слов.',
            B1: '📙 <strong>Средний немецкий (B1)</strong><br><br>Perfekt. Modalverben.',
            C1: '📕 <strong>Продвинутый немецкий (C1)</strong><br><br>Konjunktiv II. Passiv.'
          }
        };
        
        if (theories[lang] && theories[lang][level]) {
          return theories[lang][level];
        }
        return '📘 <strong>Уровень ' + level + '</strong><br><br>Изучайте язык с удовольствием!';
      }
      
      function generateTasks(vocab, level, lang) {
        var tasks = [];
        
        // 10 заданий на выбор
        for (var i = 0; i < 10 && i < vocab.length; i++) {
          var word = vocab[i];
          var wrongOptions = [];
          for (var w = 0; w < vocab.length; w++) {
            if (vocab[w].word !== word.word && wrongOptions.length < 3) {
              wrongOptions.push(vocab[w].translation);
            }
          }
          while (wrongOptions.length < 3) wrongOptions.push("???");
          var options = [word.translation].concat(wrongOptions);
          for (var s = options.length - 1; s > 0; s--) {
            var r = Math.floor(Math.random() * (s + 1));
            var temp = options[s];
            options[s] = options[r];
            options[r] = temp;
          }
          tasks.push({
            type: "choice",
            question: "📝 Перевод слова \"" + word.word + "\":",
            options: options,
            correct: word.translation,
            word: word.word
          });
        }
        
        // 5 заданий на перевод
        for (var j = 0; j < 5 && j < vocab.length; j++) {
          var word2 = vocab[j];
          tasks.push({
            type: "translate",
            question: "✍️ Переведите на " + lang + ": \"" + word2.word + "\"",
            correct: word2.translation.toLowerCase(),
            word: word2.word
          });
        }
        
        // Перемешиваем
        for (var t = tasks.length - 1; t > 0; t--) {
          var r2 = Math.floor(Math.random() * (t + 1));
          var temp2 = tasks[t];
          tasks[t] = tasks[r2];
          tasks[r2] = temp2;
        }
        
        return tasks;
      }
      
      // Запоминаем ошибочные слова
      function updateWrongWords(task, userAnswer, isCorrect) {
        if (!isCorrect && task.word) {
          var existing = null;
          for (var i = 0; i < wrongWords.length; i++) {
            if (wrongWords[i].word === task.word) {
              existing = wrongWords[i];
              break;
            }
          }
          if (existing) {
            existing.errors++;
          } else {
            wrongWords.push({ word: task.word, translation: task.correct, errors: 1 });
          }
        }
      }
      
      // ==================== СОХРАНЕНИЕ ====================
      function saveProgress() {
        var progress = {
          step: step, mode: mode, userLevel: userLevel, currentLang: currentLang,
          testAnswers: testAnswers, wrongWords: wrongWords, currentLesson: currentLesson,
          practiceAnswers: practiceAnswers, practiceResults: practiceResults, practiceIndex: practiceIndex
        };
        localStorage.setItem('aevi_progress', JSON.stringify(progress));
      }
      
      function loadProgress() {
        var saved = localStorage.getItem('aevi_progress');
        if (!saved) return false;
        try {
          var data = JSON.parse(saved);
          step = data.step || 'modeSelect';
          mode = data.mode;
          userLevel = data.userLevel;
          currentLang = data.currentLang || 'English';
          testAnswers = data.testAnswers || [];
          wrongWords = data.wrongWords || [];
          currentLesson = data.currentLesson;
          practiceAnswers = data.practiceAnswers || [];
          practiceResults = data.practiceResults || [];
          practiceIndex = data.practiceIndex || 0;
          return true;
        } catch(e) { 
          return false; 
        }
      }
      
      function resetProgress() {
        localStorage.removeItem('aevi_progress');
        step = 'modeSelect';
        mode = null;
        userLevel = null;
        currentLang = 'English';
        testAnswers = [];
        wrongWords = [];
        currentLesson = null;
        practiceAnswers = [];
        practiceResults = [];
        practiceIndex = 0;
        currentTestIndex = 0;
        render();
      }
      
      // ==================== РЕНДЕР ====================
      function render() {
        var app = document.getElementById('app');
        if (!app) return;
        
        if (step === 'modeSelect') renderModeSelect(app);
        else if (step === 'levelTest') renderLevelTest(app);
        else if (step === 'manualLevel') renderManualLevel(app);
        else if (step === 'lesson') renderLesson(app);
        
        saveProgress();
      }
      
      function renderModeSelect(container) {
        container.innerHTML = 
          '<div class="card">' +
            '<h2>🌙 Добро пожаловать в Aevi</h2>' +
            '<div class="sub">Выберите, как начать обучение</div>' +
            '<button class="btn" id="testModeBtn">📝 Пройти тест на уровень (20 вопросов)</button>' +
            '<button class="btn-secondary" id="manualModeBtn">🎯 Выбрать уровень самостоятельно</button>' +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить прогресс</button>' +
          '</div>';
        
        document.getElementById('testModeBtn').onclick = function() {
          mode = 'test';
          testAnswers = [];
          currentTestIndex = 0;
          step = 'levelTest';
          render();
        };
        document.getElementById('manualModeBtn').onclick = function() {
          mode = 'manual';
          step = 'manualLevel';
          render();
        };
        document.getElementById('resetBtn').onclick = function() {
          if (confirm('Сбросить весь прогресс?')) resetProgress();
        };
      }
      
      function renderLevelTest(container) {
        if (currentTestIndex >= placementTest.length) {
          // Тест закончен, вычисляем уровень
          var score = 0;
          var levelMap = {};
          for (var i = 0; i < testAnswers.length; i++) {
            if (testAnswers[i] === placementTest[i].correct) {
              score++;
              var qLevel = placementTest[i].level;
              levelMap[qLevel] = (levelMap[qLevel] || 0) + 1;
            }
          }
          userLevel = getLevelFromScore(score, placementTest.length);
          step = 'manualLevel';
          render();
          return;
        }
        
        var q = placementTest[currentTestIndex];
        var selectedValue = testAnswers[currentTestIndex] || '';
        
        container.innerHTML = 
          '<div class="card">' +
            '<h2>📝 Определение уровня</h2>' +
            '<div class="sub">Вопрос ' + (currentTestIndex+1) + ' из ' + placementTest.length + '</div>' +
            '<div class="progress"><div class="progress-fill" style="width:' + (currentTestIndex/placementTest.length)*100 + '%"></div></div>' +
            '<div class="practice-question">' +
              '<p style="margin-bottom:16px">' + q.text + '</p>' +
              '<div class="options">' +
                q.options.map(function(opt) { 
                  return '<div class="option ' + (selectedValue === opt ? 'selected' : '') + '" data-value="' + opt.replace(/"/g, '&quot;') + '">' + opt + '</div>'; 
                }).join('') +
              '</div>' +
            '</div>' +
            '<button class="btn" id="nextBtn">' + (currentTestIndex+1 === placementTest.length ? 'Завершить' : 'Далее') + '</button>' +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div>';
        
        var opts = document.querySelectorAll('.option');
        for (var o = 0; o < opts.length; o++) {
          opts[o].onclick = (function(el) {
            return function() {
              var allOpts = document.querySelectorAll('.option');
              for (var a = 0; a < allOpts.length; a++) allOpts[a].classList.remove('selected');
              el.classList.add('selected');
              testAnswers[currentTestIndex] = el.getAttribute('data-value');
            };
          })(opts[o]);
        }
        
        document.getElementById('nextBtn').onclick = function() {
          if (testAnswers[currentTestIndex]) {
            currentTestIndex++;
            render();
          }
        };
        
        document.getElementById('resetBtn').onclick = function() {
          if (confirm('Сбросить весь прогресс?')) resetProgress();
        };
      }
      
      function renderManualLevel(container) {
        var levelNames = { A1: 'Начинающий', A2: 'Элементарный', B1: 'Средний', B2: 'Выше среднего', C1: 'Продвинутый', C2: 'Профессиональный' };
        
        container.innerHTML = 
          '<div class="card">' +
            '<h2>✨ Настройка обучения</h2>' +
            '<div class="sub">' + (mode === 'test' ? 'Ваш уровень по результатам теста: ' + userLevel + ' (' + (levelNames[userLevel] || userLevel) + ')' : 'Выберите уровень') + '</div>' +
            '<select id="levelSelect" class="lang-select">' +
              allLevels.map(function(lvl) { return '<option value="' + lvl + '"' + (userLevel === lvl ? ' selected' : '') + '>' + lvl + ' — ' + (levelNames[lvl] || lvl) + '</option>'; }).join('') +
            '</select>' +
            '<select id="langSelect" class="lang-select">' +
              '<option value="English"' + (currentLang === 'English' ? ' selected' : '') + '>🇬🇧 Английский</option>' +
              '<option value="Spanish"' + (currentLang === 'Spanish' ? ' selected' : '') + '>🇪🇸 Испанский</option>' +
              '<option value="French"' + (currentLang === 'French' ? ' selected' : '') + '>🇫🇷 Французский</option>' +
              '<option value="German"' + (currentLang === 'German' ? ' selected' : '') + '>🇩🇪 Немецкий</option>' +
            '</select>' +
            '<button class="btn" id="startLessonBtn">📚 Начать урок</button>' +
            (mode === 'test' ? '<button class="btn-secondary" id="retestBtn">🔄 Пройти тест заново</button>' : '') +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div>';
        
        document.getElementById('levelSelect').onchange = function(e) { userLevel = e.target.value; saveProgress(); };
        document.getElementById('langSelect').onchange = function(e) { currentLang = e.target.value; saveProgress(); };
        document.getElementById('startLessonBtn').onclick = function() {
          currentLesson = generateLesson(currentLang, userLevel, wrongWords);
          practiceAnswers = new Array(currentLesson.tasks.length);
          for (var pa = 0; pa < currentLesson.tasks.length; pa++) practiceAnswers[pa] = null;
          practiceResults = new Array(currentLesson.tasks.length);
          for (var pr = 0; pr < currentLesson.tasks.length; pr++) practiceResults[pr] = false;
          practiceIndex = 0;
          step = 'lesson';
          render();
        };
        if (document.getElementById('retestBtn')) {
          document.getElementById('retestBtn').onclick = function() {
            mode = 'test';
            testAnswers = [];
            currentTestIndex = 0;
            step = 'levelTest';
            render();
          };
        }
        document.getElementById('resetBtn').onclick = function() {
          if (confirm('Сбросить весь прогресс?')) resetProgress();
        };
      }
      
      function renderLesson(container) {
        if (!currentLesson) {
          step = 'manualLevel';
          render();
          return;
        }
        
        // Показываем теорию и практику (как в предыдущей версии, но с учётом ошибок)
        var vocabHtml = '';
        for (var v = 0; v < currentLesson.vocabulary.length; v++) {
          var isWrong = false;
          for (var ww = 0; ww < wrongWords.length; ww++) {
            if (wrongWords[ww].word === currentLesson.vocabulary[v].word) isWrong = true;
          }
          var wrongClass = isWrong ? ' style="border-left-color:#ff5e7c;"' : '';
          vocabHtml += '<div class="word-item"' + wrongClass + '><span>' + currentLesson.vocabulary[v].word + '</span><span style="color:#b0f5ff;">' + currentLesson.vocabulary[v].translation + '</span></div>';
        }
        
        var total = currentLesson.tasks.length;
        var q = currentLesson.tasks[practiceIndex];
        var userAnswer = practiceAnswers[practiceIndex] || '';
        var isAnswered = practiceAnswers[practiceIndex] !== null;
        
        var correctCount = 0;
        for (var i = 0; i < practiceResults.length; i++) if (practiceResults[i] === true) correctCount++;
        
        var html = 
          '<div class="card">' +
            '<div class="flex-between"><h2>📖 Урок — ' + currentLang + ' (' + userLevel + ')</h2><div class="score">✅ ' + correctCount + '/' + total + '</div></div>' +
            '<div class="progress"><div class="progress-fill" style="width:' + (practiceIndex/total)*100 + '%"></div></div>' +
            '<div style="margin:20px 0; line-height:1.6;">' + currentLesson.theory + '</div>' +
            '<strong>📚 Словарь урока</strong>' +
            '<div class="word-list">' + vocabHtml + '</div>' +
            '<div class="practice-question">' +
              '<strong>Практика: ' + (practiceIndex+1) + '/' + total + '</strong>' +
              '<p style="margin:12px 0">' + q.question + '</p>';
        
        if (q.type === 'choice') {
          html += '<div class="options" id="practiceOptions">';
          for (var optIdx = 0; optIdx < q.options.length; optIdx++) {
            var opt = q.options[optIdx];
            var selectedClass = (userAnswer === opt) ? 'selected' : '';
            html += '<div class="option ' + selectedClass + '" data-choice="' + opt.replace(/"/g, '&quot;') + '">' + opt + '</div>';
          }
          html += '</div>';
        } else {
          html += '<input type="text" id="answerInput" class="practice-input" placeholder="Ваш ответ..." value="' + userAnswer.replace(/"/g, '&quot;') + '">';
        }
        
        if (isAnswered) {
          var resultText = practiceResults[practiceIndex] ? '✓ Верно!' : '✗ Ошибка. Правильно: ' + q.correct;
          var resultClass = practiceResults[practiceIndex] ? 'correct' : 'wrong';
          html += '<div class="result-badge ' + resultClass + '">' + resultText + '</div>';
        }
        
        html += '<div style="display:flex; gap:1rem; margin-top:1rem;">' +
          '<button class="btn" id="checkBtn" style="flex:1;">' + (isAnswered ? 'Изменить' : 'Проверить') + '</button>';
        
        if (practiceIndex + 1 < total) {
          html += '<button class="btn" id="nextBtn" style="flex:1;">Далее →</button>';
        } else {
          html += '<button class="btn" id="finishBtn" style="flex:1;">🏆 Завершить урок</button>';
        }
        
        html += '</div>' +
          '<div style="display:flex; gap:1rem; margin-top:10px;">' +
            '<button class="btn-small" id="backToMenuBtn" style="flex:1;">← В меню</button>' +
            '<button class="btn-small" id="exitBtn" style="flex:1;background:#ff5e7c20;color:#ff9eae;">⚠️ Выйти</button>' +
          '</div>' +
          '<button class="btn-small" id="resetBtn" style="margin-top:10px;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div></div>';
        
        container.innerHTML = html;
        
        if (q.type !== 'choice') {
          var input = document.getElementById('answerInput');
          if (input && !isAnswered) input.focus();
          if (input) {
            input.onkeypress = function(e) {
              if (e.key === 'Enter') document.getElementById('checkBtn').click();
            };
          }
        }
        
        if (q.type === 'choice') {
          var opts = document.querySelectorAll('#practiceOptions .option');
          for (var co = 0; co < opts.length; co++) {
            opts[co].onclick = (function(optEl) {
              return function() {
                if (isAnswered) return;
                var allOpts = document.querySelectorAll('#practiceOptions .option');
                for (var ao = 0; ao < allOpts.length; ao++) allOpts[ao].classList.remove('selected');
                optEl.classList.add('selected');
              };
            })(opts[co]);
          }
        }
        
        document.getElementById('checkBtn').onclick = function() {
          var answer = '';
          if (q.type === 'choice') {
            var selected = document.querySelector('#practiceOptions .option.selected');
            if (!selected) return;
            answer = selected.getAttribute('data-choice');
          } else {
            var inputVal = document.getElementById('answerInput');
            answer = inputVal ? inputVal.value.trim().toLowerCase() : '';
          }
          var isCorr = (answer === q.correct.toLowerCase());
          practiceAnswers[practiceIndex] = answer;
          practiceResults[practiceIndex] = isCorr;
          updateWrongWords(q, answer, isCorr);
          render();
        };
        
        var nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
          nextBtn.onclick = function() {
            if (practiceAnswers[practiceIndex] !== null) {
              practiceIndex++;
              render();
            }
          };
        }
        
        var finishBtn = document.getElementById('finishBtn');
        if (finishBtn) {
          finishBtn.onclick = function() {
            var finalCount = 0;
            for (var fc = 0; fc < practiceResults.length; fc++) if (practiceResults[fc] === true) finalCount++;
            alert('✨ Урок завершён! Результат: ' + finalCount + ' / ' + total + '\nОшибочные слова будут повторяться в следующих уроках.');
            
            // Повышаем уровень при хорошем результате
            var allLevelsArr = ['A1', 'A2', 'B1', 'B2', 'C1', 'C2'];
            var currentIdx = allLevelsArr.indexOf(userLevel);
            if (finalCount / total >= 0.8 && currentIdx < allLevelsArr.length - 1) {
              if (confirm('🎉 Отличный результат! Перейти на уровень ' + allLevelsArr[currentIdx + 1] + '?')) {
                userLevel = allLevelsArr[currentIdx + 1];
              }
            }
            
            step = 'manualLevel';
            render();
          };
        }
        
        document.getElementById('backToMenuBtn').onclick = function() {
          step = 'manualLevel';
          render();
        };
        
        document.getElementById('exitBtn').onclick = function() {
          if (confirm('⚠️ Выйти? Прогресс этого урока будет потерян.')) {
            step = 'manualLevel';
            render();
          }
        };
        
        document.getElementById('resetBtn').onclick = function() {
          if (confirm('Сбросить всё?')) resetProgress();
        };
      }
      
      // ==================== ЗАПУСК ====================
      document.addEventListener('DOMContentLoaded', function() {
        loadProgress();
        render();
      });
    })();
  </script>
</body>
</html>
