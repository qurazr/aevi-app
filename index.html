<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AEVI English</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Заставка -->
    <div id="splash-screen" class="show">
        <div class="logo-container">
            <h1 class="logo-text">AEVI</h1>
            <p class="logo-sub">Learn English. Anywhere.</p>
        </div>
    </div>

    <!-- Главный экран -->
    <div id="home-screen" class="screen">
        <header class="app-header">
            <div class="points-box">🏆 Баллы: <span id="points-display">0</span></div>
            <button id="premium-btn" class="premium-toggle"> Получить подписку</button>
        </header>

        <div class="level-selector">
            <h3>Выберите уровень:</h3>
            <div class="levels-row" id="levels-container"></div>
        </div>

        <div class="lessons-grid" id="lessons-container"></div>

        <div class="sub-banner" id="sub-banner" style="display:none;">
            Уровень B2 доступен по подписке
        </div>
    </div>

    <!-- Экран теории -->
    <div id="theory-screen" class="screen">
        <div class="theory-header">
            <button class="back-btn" onclick="goHome()">← Назад</button>
            <h2 id="theory-title">Теория</h2>
        </div>
        <div class="theory-content" id="theory-content"></div>
        <button id="theory-next-btn" class="action-btn">Далее →</button>
    </div>

    <!-- Экран теста -->
    <div id="quiz-screen" class="screen">
        <div class="quiz-header">
            <button class="back-btn" onclick="goHome()">← Выйти</button>
            <div class="quiz-progress"><span id="quiz-step">1</span> / 20</div>
        </div>
        <div class="progress-bar"><div id="quiz-fill" style="width: 5%"></div></div>
        <h2 id="quiz-question">Вопрос...</h2>
        <div id="quiz-options" class="options-grid"></div>
    </div>

    <!-- Экран результата -->
    <div id="result-screen" class="screen">
        <div class="result-card">
            <h2> Урок завершён!</h2>
            <p>Правильных ответов: <span id="result-correct">0</span> / 20</p>
            <p class="points-earned">+ <span id="result-points">0</span> баллов</p>
            <button class="action-btn" onclick="goHome()">На главную</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
