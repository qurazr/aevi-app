<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Журнал</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            padding: 16px;
            padding-bottom: 80px;
        }

        /* Админ-панель (видна только админам) */
        .admin-panel {
            background: var(--tg-theme-secondary-bg-color, #f0f0f0);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
            display: none;
        }

        .admin-panel h3 {
            margin-bottom: 12px;
            font-size: 18px;
        }

        .admin-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        button:hover {
            opacity: 0.9;
        }

        button.secondary {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            color: var(--tg-theme-text-color, #000000);
        }

        .magazine-selector {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 8px 0;
        }

        .magazine-tab {
            background: var(--tg-theme-secondary-bg-color, #e0e0e0);
            padding: 8px 16px;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
        }

        .magazine-tab.active {
            background: var(--tg-theme-button-color, #2481cc);
            color: white;
        }

        .article {
            background: var(--tg-theme-secondary-bg-color, #f5f5f5);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .article img {
            max-width: 100%;
            border-radius: 8px;
            margin-top: 12px;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        .modal-content {
            background: var(--tg-theme-bg-color, white);
            border-radius: 16px;
            padding: 20px;
            width: 90%;
            max-width: 400px;
        }

        .modal-content input, .modal-content textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: inherit;
        }

        .modal-content textarea {
            min-height: 100px;
        }

        h2 {
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>📘 Мой Журнал</h1>
        
        <!-- Админ-панель -->
        <div id="adminPanel" class="admin-panel">
            <h3>🔧 Админ-панель</h3>
            <div class="admin-buttons">
                <button onclick="showAddTextModal()">➕ Добавить текст</button>
                <button onclick="showAddImageModal()">🖼 Добавить картинку</button>
                <button onclick="showNewMagazineModal()">📘 Создать журнал</button>
            </div>
        </div>

        <!-- Выбор журнала -->
        <div id="magazineSelector" class="magazine-selector"></div>

        <!-- Список статей -->
        <div id="articlesList"></div>
    </div>

    <!-- Модальные окна -->
    <div id="textModal" class="modal">
        <div class="modal-content">
            <h3>Добавить текст</h3>
            <textarea id="textContent" placeholder="Введите текст..."></textarea>
            <button onclick="addTextArticle()">Добавить</button>
            <button class="secondary" onclick="closeModal('textModal')">Отмена</button>
        </div>
    </div>

    <div id="imageModal" class="modal">
        <div class="modal-content">
            <h3>Добавить картинку</h3>
            <input type="text" id="imageUrl" placeholder="URL картинки">
            <textarea id="imageCaption" placeholder="Подпись (необязательно)"></textarea>
            <button onclick="addImageArticle()">Добавить</button>
            <button class="secondary" onclick="closeModal('imageModal')">Отмена</button>
        </div>
    </div>

    <div id="magazineModal" class="modal">
        <div class="modal-content">
            <h3>Новый журнал</h3>
            <input type="text" id="magazineName" placeholder="Название журнала">
            <button onclick="createMagazine()">Создать</button>
            <button class="secondary" onclick="closeModal('magazineModal')">Отмена</button>
        </div>
    </div>

    <script>
        // --- Данные (локальное хранилище, не требует бэкенда) ---
        let magazines = [];
        let currentMagazineId = null;
        let isAdmin = false;

        // Инициализация Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.expand(); // Растянуть на весь экран
        tg.MainButton.hide();

        // Получаем данные пользователя
        const user = tg.initDataUnsafe?.user;
        
        // СПИСОК АДМИНОВ (Telegram ID)
        const ADMIN_IDS = [123456789]; // 👈 ЗАМЕНИТЕ НА СВОЙ TELEGRAM ID
        
        if (user && ADMIN_IDS.includes(user.id)) {
            isAdmin = true;
            document.getElementById('adminPanel').style.display = 'block';
        }

        // --- Работа с localStorage ---
        function loadData() {
            const saved = localStorage.getItem('magazine_app');
            if (saved) {
                const data = JSON.parse(saved);
                magazines = data.magazines || [];
                currentMagazineId = data.currentMagazineId;
            }
            
            if (magazines.length === 0) {
                // Создаем журнал по умолчанию
                magazines.push({
                    id: Date.now(),
                    name: 'Первый выпуск',
                    articles: []
                });
                currentMagazineId = magazines[0].id;
                saveData();
            }
            
            render();
        }

        function saveData() {
            localStorage.setItem('magazine_app', JSON.stringify({
                magazines: magazines,
                currentMagazineId: currentMagazineId
            }));
        }

        // --- Основные функции ---
        function render() {
            renderMagazineTabs();
            renderArticles();
        }

        function renderMagazineTabs() {
            const container = document.getElementById('magazineSelector');
            container.innerHTML = '';
            
            magazines.forEach(mag => {
                const tab = document.createElement('div');
                tab.className = 'magazine-tab';
                if (mag.id === currentMagazineId) tab.classList.add('active');
                tab.textContent = mag.name;
                tab.onclick = () => {
                    currentMagazineId = mag.id;
                    saveData();
                    render();
                };
                container.appendChild(tab);
            });
        }

        function renderArticles() {
            const container = document.getElementById('articlesList');
            const currentMag = magazines.find(m => m.id === currentMagazineId);
            
            if (!currentMag || currentMag.articles.length === 0) {
                container.innerHTML = '<p>Пока нет записей.</p>';
                return;
            }
            
            container.innerHTML = '';
            currentMag.articles.forEach((article, index) => {
                const div = document.createElement('div');
                div.className = 'article';
                
                if (article.type === 'text') {
                    div.innerHTML = `<p>${article.content.replace(/\n/g, '<br>')}</p>`;
                } else if (article.type === 'image') {
                    div.innerHTML = `
                        ${article.caption ? `<p>${article.caption.replace(/\n/g, '<br>')}</p>` : ''}
                        <img src="${article.url}" alt="Изображение">
                    `;
                }
                
                // Кнопка удаления для админов
                if (isAdmin) {
                    const deleteBtn = document.createElement('button');
                    deleteBtn.textContent = '🗑 Удалить';
                    deleteBtn.style.marginTop = '10px';
                    deleteBtn.style.background = '#dc3545';
                    deleteBtn.onclick = () => deleteArticle(index);
                    div.appendChild(deleteBtn);
                }
                
                container.appendChild(div);
            });
        }

        // --- Админ-функции ---
        function showAddTextModal() {
            document.getElementById('textModal').style.display = 'flex';
        }

        function showAddImageModal() {
            document.getElementById('imageModal').style.display = 'flex';
        }

        function showNewMagazineModal() {
            document.getElementById('magazineModal').style.display = 'flex';
        }

        function closeModal(modalId) {
            document.getElementById(modalId).style.display = 'none';
        }

        function addTextArticle() {
            const content = document.getElementById('textContent').value.trim();
            if (!content) {
                tg.showAlert('Введите текст');
                return;
            }
            
            const currentMag = magazines.find(m => m.id === currentMagazineId);
            if (currentMag) {
                currentMag.articles.push({
                    type: 'text',
                    content: content
                });
                saveData();
                render();
            }
            
            closeModal('textModal');
            document.getElementById('textContent').value = '';
            tg.showAlert('Текст добавлен!');
        }

        function addImageArticle() {
            const url = document.getElementById('imageUrl').value.trim();
            const caption = document.getElementById('imageCaption').value.trim();
            
            if (!url) {
                tg.showAlert('Введите URL картинки');
                return;
            }
            
            const currentMag = magazines.find(m => m.id === currentMagazineId);
            if (currentMag) {
                currentMag.articles.push({
                    type: 'image',
                    url: url,
                    caption: caption
                });
                saveData();
                render();
            }
            
            closeModal('imageModal');
            document.getElementById('imageUrl').value = '';
            document.getElementById('imageCaption').value = '';
            tg.showAlert('Картинка добавлена!');
        }

        function createMagazine() {
            const name = document.getElementById('magazineName').value.trim();
            if (!name) {
                tg.showAlert('Введите название');
                return;
            }
            
            const newMag = {
                id: Date.now(),
                name: name,
                articles: []
            };
            magazines.push(newMag);
            saveData();
            render();
            
            closeModal('magazineModal');
            document.getElementById('magazineName').value = '';
            tg.showAlert(`Журнал "${name}" создан!`);
        }

        function deleteArticle(index) {
            const currentMag = magazines.find(m => m.id === currentMagazineId);
            if (currentMag) {
                currentMag.articles.splice(index, 1);
                saveData();
                render();
                tg.showAlert('Запись удалена');
            }
        }

        // Запуск
        loadData();
        
        // Главная кнопка для возврата к началу (опционально)
        tg.MainButton.setText('📖 К началу');
        tg.MainButton.onClick(() => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
        tg.MainButton.show();
    </script>
</body>
</html>
