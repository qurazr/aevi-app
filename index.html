<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — Изучение языков</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E17;
            font-family: 'Segoe UI', 'Inter', system-ui, -apple-system, sans-serif;
            color: #FFFFFF;
            padding: 1rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* Левая панель с темами */
        .topics-panel {
            flex: 2;
            min-width: 260px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .topics-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .level-selector {
            background: #0F1322;
            border: 1px solid #2A2F42;
            border-radius: 48px;
            padding: 8px 16px;
            color: white;
            font-weight: 500;
            cursor: pointer;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            border: 1px solid #282E44;
        }

        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }

        .topic-item.completed .topic-status {
            background: #0aff9d;
            color: #0B0E17;
        }

        .topic-item.active {
            border-color: #0aff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
            background: #1A2035;
        }

        .topic-status {
            width: 28px;
            height: 28px;
            background: #2A2F42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .topic-name {
            flex: 1;
            font-weight: 500;
        }

        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }

        /* Правая панель (теория/практика/результаты) */
        .content-panel {
            flex: 5;
            min-width: 300px;
            background: rgba(12, 15, 26, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
        }

        .glow-text {
            background: linear-gradient(135deg, #BFFFC7, #7DF9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
        }

        .btn-danger {
            background: #ff5e7c;
            background: linear-gradient(95deg, #ff5e7c, #ff9eae);
            color: #1a0f12;
        }

        .ai-explanation {
            background: #0F1322;
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            border-left: 4px solid #0aff9d;
            font-size: 0.9rem;
            color: #CCDDFF;
        }

        .infinite-practice-area {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 24px;
            padding: 16px;
            margin-top: 20px;
            text-align: center;
        }

        .mistake-stats {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            font-size: 12px;
            margin-bottom: 12px;
            color: #8A93B0;
        }

        .progress {
            margin: 10px 0;
            height: 6px;
            background: #1e2a32;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
        }

        .practice-question {
            background: #11161f;
            border-radius: 24px;
            padding: 1.2rem;
            margin-bottom: 1.2rem;
        }

        .practice-input {
            background: #0a0f16;
            border: 1px solid #2a3a4a;
            border-radius: 40px;
            padding: 12px 18px;
            width: 100%;
            color: white;
            margin: 12px 0;
            font-size: 1rem;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .option {
            background: #0f141c;
            padding: 12px 18px;
            border-radius: 40px;
            cursor: pointer;
            border: 1px solid #2c3a4a;
            transition: all 0.2s;
            text-align: center;
        }

        .option:hover {
            border-color: #0aff9d;
            background: #1a2a2f;
        }

        .selected {
            background: #0aff9d20;
            border-color: #0aff9d;
            color: #ccffdd;
        }

        .theory-block, .practice-block, .results-block {
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== ПОЛНАЯ БАЗА ТЕМ A1-C2 ====================
    const KNOWLEDGE_BASE = {
        English: {
            A1: [
                { id: "a1_1", title: "Greetings & Introductions", grammarFocus: "to be", theory: "<strong>Greetings and the verb TO BE</strong><br><br>I am Alex. / You are a student.<br><strong>Negative:</strong> I am not (I'm not) tired.<br><strong>Question:</strong> Are you ready?" },
                { id: "a1_2", title: "Verb TO BE", grammarFocus: "to be", theory: "<strong>Conjugation of TO BE</strong><br><br>I am, He/She/It is, You/We/They are.<br>+ I am happy. - I am not sad. ? Are you OK?" },
                { id: "a1_3", title: "Plural nouns", grammarFocus: "plural", theory: "<strong>Plural rules</strong><br><br>cat → cats, bus → buses, lady → ladies.<br>Exceptions: man → men, child → children, foot → feet." },
                { id: "a1_4", title: "Articles A / AN / THE", grammarFocus: "articles", theory: "<strong>Articles</strong><br><br>a + consonant sound (a dog), an + vowel sound (an apple).<br>THE — specific: the sun, the car we saw." },
                { id: "a1_5", title: "Present Simple", grammarFocus: "present simple", theory: "<strong>Present Simple</strong><br><br>I work / He works.<br>- I don't work / He doesn't work.<br>? Do you work? / Does she work?" }
            ],
            A2: [
                { id: "a2_1", title: "Past Simple (regular verbs)", grammarFocus: "past simple", theory: "<strong>Past Simple (regular)</strong><br><br>+ed: I played, she watched.<br>- didn't play. ? Did you play?" },
                { id: "a2_2", title: "Irregular verbs (part 1)", grammarFocus: "irregular verbs", theory: "<strong>Irregular verbs</strong><br><br>go→went, see→saw, buy→bought, think→thought, eat→ate" },
                { id: "a2_3", title: "Future Simple (will)", grammarFocus: "future", theory: "<strong>Future Simple</strong><br><br>I will call you tomorrow.<br>- won't. ? Will you come?" },
                { id: "a2_4", title: "To be going to", grammarFocus: "future plans", theory: "<strong>To be going to</strong><br><br>I am going to study Spanish. (planned action)" }
            ],
            B1: [
                { id: "b1_1", title: "Present Perfect", grammarFocus: "present perfect", theory: "<strong>Present Perfect</strong><br><br>I have visited London. / She has never tried sushi.<br>Markers: ever, never, already, yet, since, for." },
                { id: "b1_2", title: "Present Perfect Continuous", grammarFocus: "present perfect continuous", theory: "<strong>Present Perfect Continuous</strong><br><br>I have been waiting for 2 hours. (focus on duration)" },
                { id: "b1_3", title: "Conditionals (type 0,1)", grammarFocus: "conditionals", theory: "<strong>Conditionals</strong><br><br>Zero: If you heat ice, it melts.<br>First: If it rains, I will stay home." },
                { id: "b1_4", title: "Modal Verbs (can, could, may)", grammarFocus: "modals", theory: "<strong>Modal Verbs</strong><br><br>can (ability), could (polite request), may (permission)" }
            ],
            B2: [
                { id: "b2_1", title: "Passive Voice", grammarFocus: "passive", theory: "<strong>Passive Voice</strong><br><br>The book was written by Tolstoy.<br>Formula: to be + V3 (past participle)." },
                { id: "b2_2", title: "Conditionals (type 2,3)", grammarFocus: "conditionals", theory: "<strong>Conditionals type 2 and 3</strong><br><br>Second: If I were rich, I would travel.<br>Third: If you had called, I would have helped." },
                { id: "b2_3", title: "Reported Speech", grammarFocus: "reported speech", theory: "<strong>Reported Speech</strong><br><br>She said that she was tired.<br>Tense shift: present → past." },
                { id: "b2_4", title: "Relative Clauses", grammarFocus: "clauses", theory: "<strong>Relative Clauses</strong><br><br>The man who called you is my brother.<br>The book which I bought is interesting." }
            ],
            C1: [
                { id: "c1_1", title: "Inversion", grammarFocus: "inversion", theory: "<strong>Inversion</strong><br><br>Never have I seen such beauty.<br>Not only did she arrive late, but she also forgot her keys." },
                { id: "c1_2", title: "Subjunctive", grammarFocus: "subjunctive", theory: "<strong>Subjunctive</strong><br><br>I suggest that he go to the doctor.<br>It's essential that she be informed." },
                { id: "c1_3", title: "Mixed Conditionals", grammarFocus: "mixed conditionals", theory: "<strong>Mixed Conditionals</strong><br><br>If he had studied, he would be an expert now." },
                { id: "c1_4", title: "Ellipsis and Substitution", grammarFocus: "ellipsis", theory: "<strong>Ellipsis and Substitution</strong><br><br>'Can you help?' 'I can.' (ellipsis)" }
            ],
            C2: [
                { id: "c2_1", title: "Idioms & Fixed Expressions", grammarFocus: "idioms", theory: "<strong>Idioms</strong><br><br>'Spill the beans' — reveal a secret.<br>'Hit the nail on the head' — describe exactly." },
                { id: "c2_2", title: "Advanced Inversion & Fronting", grammarFocus: "advanced inversion", theory: "<strong>Advanced Inversion</strong><br><br>'Had I known, I would have acted.'<br>'Such was his anger that he left.'" },
                { id: "c2_3", title: "Nominalization", grammarFocus: "nominalization", theory: "<strong>Nominalization</strong><br><br>'The discovery of the cure' instead of 'They discovered the cure'." },
                { id: "c2_4", title: "Rhetorical Devices", grammarFocus: "rhetoric", theory: "<strong>Rhetorical Devices</strong><br><br>Anaphora: 'We shall fight on the beaches, we shall fight...'" }
            ]
        }
    };

    // Дополняем уровни до 8 тем
    for (let lvl of ['A1', 'A2', 'B1', 'B2', 'C1', 'C2']) {
        const current = KNOWLEDGE_BASE.English[lvl];
        const need = 8;
        while (current.length < need) {
            const num = current.length + 1;
            current.push({
                id: `${lvl.toLowerCase()}_extra_${num}`,
                title: `${lvl} — Theme ${num}: Extended Practice`,
                grammarFocus: "general",
                theory: `<strong>Extended lesson ${lvl}</strong><br><br>Studying advanced constructions of level ${lvl}.<br>Example: "They have been mastering these skills."<br>Practice through exercises.`
            });
        }
    }

    // Генерация 20 заданий для темы
    function generatePracticeForTopic(topic, level, lang = "English") {
        let tasks = [];
        const grammar = topic.grammarFocus || "general";
        for (let i = 0; i < 20; i++) {
            if (grammar === "to be" || grammar === "present simple") {
                tasks.push({ type: "input", question: "Put the verb in the correct form: She ___ (be) a doctor.", correct: "is", aiExplanation: "She + is (3rd person singular)" });
                tasks.push({ type: "choice", question: "Choose the correct option: They ___ playing football now.", options: ["is", "am", "are", "be"], correct: "are", aiExplanation: "They are — plural form." });
            } else if (grammar === "past simple") {
                tasks.push({ type: "input", question: "Put in Past Simple: Yesterday I ___ (go) to the cinema.", correct: "went", aiExplanation: "Irregular verb: go → went." });
            } else if (grammar === "present perfect") {
                tasks.push({ type: "input", question: "I ___ (never/see) such a beautiful sunset.", correct: "have never seen", aiExplanation: "Present Perfect: have + V3" });
            } else if (grammar === "passive") {
                tasks.push({ type: "input", question: "The cake ___ (make) by my grandmother.", correct: "was made", aiExplanation: "Passive voice: was + V3" });
            } else {
                tasks.push({ type: "translate", question: "Translate the word 'success'", correct: "success", aiExplanation: "success — important vocabulary" });
                tasks.push({ type: "input", question: "She advised that he ___ (go) there.", correct: "go", aiExplanation: "Subjunctive: advise that + go" });
            }
        }
        return tasks.slice(0, 20);
    }

    // Состояние
    let currentLevel = "A1";
    let topics = KNOWLEDGE_BASE.English[currentLevel] || [];
    let completedTopics = JSON.parse(localStorage.getItem("aevi_completed")) || [];
    let mistakeHistory = JSON.parse(localStorage.getItem("aevi_mistakes")) || [];
    let currentTopic = null;
    let currentMode = "topics"; // topics, theory, practice, results
    let currentPracticeTasks = [];
    let currentTaskIdx = 0;
    let practiceAnswers = [];
    let practiceResults = [];
    let showExplanation = false;
    let lastMistakeInfo = null;

    function saveAll() {
        localStorage.setItem("aevi_completed", JSON.stringify(completedTopics));
        localStorage.setItem("aevi_mistakes", JSON.stringify(mistakeHistory));
        localStorage.setItem("aevi_level", currentLevel);
    }

    function selectTopic(topic) {
        currentTopic = topic;
        currentMode = "theory";
        renderApp();
    }

    function markTopicCompleted(topicId) {
        if (!completedTopics.includes(topicId)) {
            completedTopics.push(topicId);
            saveAll();
        }
    }

    function registerMistake(question, correct, userAnswer, grammarFocus) {
        mistakeHistory.unshift({ question, correct, userAnswer, grammarFocus, timestamp: Date.now() });
        if (mistakeHistory.length > 200) mistakeHistory.pop();
        saveAll();
        const recentMistakes = mistakeHistory.slice(0, 10).filter(m => m.grammarFocus === grammarFocus).length;
        const advice = recentMistakes < 3 
            ? "You are progressing, I will ask this topic less often." 
            : "This mistake repeats, the topic will appear more often.";
        return { explanation: `AI analysis: Correct answer — "${correct}". You wrote "${userAnswer}". ${grammarFocus ? `Pay attention to grammar: ${grammarFocus}.` : ""} ${advice}` };
    }

    function startInfinitePractice() {
        let taskPool = [];
        const grammarSet = new Set(mistakeHistory.slice(0, 30).map(m => m.grammarFocus || "general"));
        Array.from(grammarSet).forEach(g => {
            for (let i=0;i<3;i++) taskPool.push({ type: "translate", question: `Practice grammar [${g}]: translate "confidence"`, correct: "confidence", aiExplanation: "Repeating mistakes", grammarFocus: g });
        });
        if (taskPool.length<10) taskPool.push({ type: "input", question: "She ___ (to be) happy.", correct: "is", aiExplanation: "", grammarFocus: "to be" });
        currentPracticeTasks = taskPool.slice(0,20);
        currentTaskIdx = 0;
        practiceAnswers = new Array(currentPracticeTasks.length).fill(null);
        practiceResults = new Array(currentPracticeTasks.length).fill(false);
        currentMode = "practice";
        showExplanation = false;
        renderApp();
    }

    function startTopicPractice() {
        if (!currentTopic) return;
        currentPracticeTasks = generatePracticeForTopic(currentTopic, currentLevel);
        currentTaskIdx = 0;
        practiceAnswers = new Array(currentPracticeTasks.length).fill(null);
        practiceResults = new Array(currentPracticeTasks.length).fill(false);
        currentMode = "practice";
        showExplanation = false;
        renderApp();
    }

    function finishPractice() {
        const total = currentPracticeTasks.length;
        const correctCount = practiceResults.filter(r => r === true).length;
        const percent = (correctCount / total) * 100;
        if (percent >= 70 && currentTopic) markTopicCompleted(currentTopic.id);
        currentMode = "results";
        renderApp();
    }

    function checkCurrentTask(answer) {
        const task = currentPracticeTasks[currentTaskIdx];
        const isCorrect = (answer.trim().toLowerCase() === task.correct.toLowerCase());
        practiceAnswers[currentTaskIdx] = answer;
        practiceResults[currentTaskIdx] = isCorrect;
        if (!isCorrect) {
            const aiResp = registerMistake(task.question, task.correct, answer, task.grammarFocus || "general");
            lastMistakeInfo = { explanation: aiResp.explanation };
            showExplanation = true;
            renderApp();
        } else {
            showExplanation = false;
            if (currentTaskIdx + 1 < currentPracticeTasks.length) {
                currentTaskIdx++;
                renderApp();
            } else {
                finishPractice();
            }
        }
        saveAll();
    }

    function backToTopics() {
        currentMode = "topics";
        currentTopic = null;
        renderApp();
    }

    function renderApp() {
        const container = document.getElementById('app');
        if (!container) return;

        // Левая панель (всегда видна)
        const topicListHtml = topics.map((t, idx) => {
            const isCompleted = completedTopics.includes(t.id);
            const isActive = currentTopic && currentTopic.id === t.id;
            return `
                <div class="topic-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" data-id="${t.id}">
                    <div class="topic-status">${isCompleted ? '✓' : idx+1}</div>
                    <div class="topic-name">${t.title}</div>
                    <div class="topic-badge">${t.grammarFocus || 'vocab'}</div>
                </div>
            `;
        }).join('');
        
        const completedCount = completedTopics.filter(id => topics.some(t => t.id === id)).length;
        
        // Правая панель (меняется)
        let rightPanelHtml = '';
        
        if (currentMode === "topics") {
            rightPanelHtml = `
                <div class="theory-block">
                    <h2>Select a topic</h2>
                    <p>Choose a topic from the list on the left to start learning.</p>
                    <div class="infinite-practice-area">
                        <button class="btn-outline btn" id="globalInfiniteBtn">Practice mistakes + words</button>
                    </div>
                </div>
            `;
        } else if (currentMode === "theory" && currentTopic) {
            rightPanelHtml = `
                <div class="theory-block">
                    <h2>${currentTopic.title}</h2>
                    <div class="mistake-stats">Mistakes in this topic: ${mistakeHistory.filter(m => m.grammarFocus === currentTopic.grammarFocus).length}</div>
                    <div style="line-height:1.6; margin: 20px 0;">${currentTopic.theory}</div>
                    <button class="btn" id="startPracticeBtn">Go to practice (20 tasks)</button>
                    <button class="btn-outline btn" id="backToTopicsBtn">Back to topics</button>
                </div>
            `;
        } else if (currentMode === "practice" && currentPracticeTasks.length) {
            const task = currentPracticeTasks[currentTaskIdx];
            const userAnswer = practiceAnswers[currentTaskIdx] || '';
            const isAnswered = practiceAnswers[currentTaskIdx] !== null;
            rightPanelHtml = `
                <div class="practice-block">
                    <div class="flex-between" style="display:flex; justify-content:space-between; margin-bottom:16px;">
                        <h3>Practice: ${currentTopic?.title || 'Mistake practice'}</h3>
                        <span>${currentTaskIdx+1}/${currentPracticeTasks.length}</span>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${(currentTaskIdx/currentPracticeTasks.length)*100}%"></div></div>
                    <div class="practice-question">
                        <p><strong>${task.question}</strong></p>
                        ${task.type === 'choice' ? `<div class="options">${task.options.map(opt => `<div class="option" data-val="${opt}">${opt}</div>`).join('')}</div>` : `<input type="text" id="answerField" class="practice-input" placeholder="Your answer..." value="${userAnswer || ''}">`}
                        <button class="btn" id="submitAnswerBtn" style="margin-top:12px">${isAnswered ? 'Change' : 'Check'}</button>
                        ${showExplanation && lastMistakeInfo ? `<div class="ai-explanation">${lastMistakeInfo.explanation}</div>` : ''}
                    </div>
                </div>
            `;
        } else if (currentMode === "results") {
            const total = currentPracticeTasks.length;
            const correctCount = practiceResults.filter(r => r === true).length;
            const percent = Math.round((correctCount / total) * 100);
            rightPanelHtml = `
                <div class="results-block">
                    <h2>Practice results</h2>
                    <div style="text-align:center; margin: 40px 0;">
                        <div style="font-size: 48px; font-weight: bold; color: #0aff9d;">${correctCount}/${total}</div>
                        <div style="font-size: 18px; margin-top: 8px;">${percent}% correct</div>
                    </div>
                    <div class="progress"><div class="progress-fill" style="width:${percent}%"></div></div>
                    ${percent >= 70 ? '<p style="margin: 20px 0; text-align:center;">Topic completed! Well done.</p>' : '<p style="margin: 20px 0; text-align:center;">Review the theory and try again.</p>'}
                    <button class="btn" id="backToTopicsBtn">Back to topics</button>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="topics-panel">
                <div class="topics-header">
                    <h3><span class="glow-text">Aevi</span> · ${currentLevel}</h3>
                    <select id="levelSelect" class="level-selector">
                        <option value="A1" ${currentLevel==='A1' ? 'selected' : ''}>Level A1 (Beginner)</option>
                        <option value="A2" ${currentLevel==='A2' ? 'selected' : ''}>Level A2 (Elementary)</option>
                        <option value="B1" ${currentLevel==='B1' ? 'selected' : ''}>Level B1 (Intermediate)</option>
                        <option value="B2" ${currentLevel==='B2' ? 'selected' : ''}>Level B2 (Upper Intermediate)</option>
                        <option value="C1" ${currentLevel==='C1' ? 'selected' : ''}>Level C1 (Advanced)</option>
                        <option value="C2" ${currentLevel==='C2' ? 'selected' : ''}>Level C2 (Proficient)</option>
                    </select>
                </div>
                <div class="progress"><div class="progress-fill" style="width:${(completedCount/topics.length)*100}%"></div></div>
                <div class="topic-list" id="topicList">
                    ${topicListHtml}
                </div>
                <div class="infinite-practice-area">
                    <button class="btn-outline btn" id="globalInfiniteBtn">Practice mistakes + words</button>
                </div>
            </div>
            <div class="content-panel" id="rightPanel">${rightPanelHtml}</div>
        `;

        // События
        document.getElementById('levelSelect')?.addEventListener('change', (e) => {
            currentLevel = e.target.value;
            topics = KNOWLEDGE_BASE.English[currentLevel] || [];
            currentTopic = null;
            currentMode = "topics";
            saveAll();
            renderApp();
        });
        
        document.querySelectorAll('.topic-item').forEach(el => {
            const topicId = el.dataset.id;
            const topic = topics.find(t => t.id === topicId);
            if (topic) {
                el.addEventListener('click', () => selectTopic(topic));
            }
        });
        
        document.getElementById('startPracticeBtn')?.addEventListener('click', startTopicPractice);
        document.getElementById('backToTopicsBtn')?.addEventListener('click', backToTopics);
        
        document.getElementById('globalInfiniteBtn')?.addEventListener('click', startInfinitePractice);
        
        document.getElementById('submitAnswerBtn')?.addEventListener('click', () => {
            let answer = '';
            const task = currentPracticeTasks[currentTaskIdx];
            if (task.type === 'choice') {
                const selected = document.querySelector('.option.selected');
                if (!selected) return;
                answer = selected.dataset.val;
            } else {
                const field = document.getElementById('answerField');
                if (!field) return;
                answer = field.value.trim();
            }
            checkCurrentTask(answer);
        });
        
        document.querySelectorAll('.option').forEach(opt => {
            opt.addEventListener('click', function() {
                if (practiceAnswers[currentTaskIdx] !== null) return;
                document.querySelectorAll('.option').forEach(o => o.classList.remove('selected'));
                this.classList.add('selected');
            });
        });
    }
    
    renderApp();
</script>
</body>
</html>
