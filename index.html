<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Aevi | Language Learning</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0a0a0f;
      font-family: system-ui, -apple-system, sans-serif;
      color: #eef5ff;
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .app-container {
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
    }

    .card {
      background: rgba(15, 20, 30, 0.75);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(10, 255, 157, 0.3);
      border-radius: 28px;
      padding: 1.8rem;
      box-shadow: 0 8px 20px rgba(0,0,0,0.6), 0 0 15px rgba(10, 255, 157, 0.2);
    }

    h2 {
      font-size: 1.8rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      background: linear-gradient(135deg, #ffffff, #a0f0ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    .sub {
      color: #9aaebf;
      margin-bottom: 1.5rem;
      font-size: 0.9rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .option {
      background: #0f141c;
      padding: 12px 18px;
      border-radius: 40px;
      cursor: pointer;
      border: 1px solid #2c3a4a;
      transition: all 0.2s;
      text-align: center;
    }

    .option:hover {
      border-color: #0aff9d;
      background: #1a2a2f;
      box-shadow: 0 0 6px #0aff9d;
    }

    .selected {
      background: #0aff9d20;
      border-color: #0aff9d;
      color: #ccffdd;
      box-shadow: 0 0 10px #0aff9d40;
    }

    .btn {
      background: linear-gradient(95deg, #0aff9d, #00c3ff);
      border: none;
      padding: 12px 28px;
      border-radius: 60px;
      font-weight: 700;
      font-size: 1rem;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 1rem;
      width: 100%;
    }

    .btn-small {
      background: linear-gradient(95deg, #0aff9d, #00c3ff);
      border: none;
      padding: 8px 16px;
      border-radius: 60px;
      font-weight: 600;
      font-size: 0.85rem;
      color: #0a0f1a;
      cursor: pointer;
      transition: 0.2s;
      margin-top: 0.5rem;
    }

    .btn:hover, .btn-small:hover {
      transform: scale(0.98);
      box-shadow: 0 0 18px #0aff9d;
    }

    .lang-select {
      background: #0f141c;
      border: 1px solid #2c3a4a;
      border-radius: 60px;
      padding: 12px 20px;
      width: 100%;
      color: white;
      font-size: 1rem;
      margin-bottom: 1rem;
    }

    .progress {
      margin: 20px 0 10px;
      height: 6px;
      background: #1e2a32;
      border-radius: 10px;
      overflow: hidden;
    }

    .progress-fill {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #0aff9d, #00c3ff);
      box-shadow: 0 0 5px #0aff9d;
    }

    .word-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin: 20px 0;
    }

    .word-item {
      background: #0b1018;
      padding: 12px 18px;
      border-radius: 20px;
      display: flex;
      justify-content: space-between;
      border-left: 4px solid #0aff9d;
    }

    .practice-question {
      background: #11161f;
      border-radius: 24px;
      padding: 1.2rem;
      margin-bottom: 1.2rem;
    }

    .practice-input {
      background: #0a0f16;
      border: 1px solid #2a3a4a;
      border-radius: 40px;
      padding: 12px 18px;
      width: 100%;
      color: white;
      margin: 12px 0;
      font-size: 1rem;
    }

    .result-badge {
      margin-top: 12px;
      font-size: 0.85rem;
    }

    .correct {
      color: #0aff9d;
    }

    .wrong {
      color: #ff5e7c;
    }

    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .score {
      font-size: 1.3rem;
      font-weight: 700;
      color: #0aff9d;
    }

    .button-group {
      display: flex;
      gap: 1rem;
      margin-top: 1rem;
    }

    @media (max-width: 600px) {
      .card { padding: 1.2rem; }
      h2 { font-size: 1.4rem; }
      .btn, .btn-small { width: 100%; }
      .button-group { flex-direction: column; gap: 0.5rem; }
      .word-item { flex-direction: column; gap: 8px; }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <main id="app"></main>
  </div>

  <script>
    (function() {
      // Функция перемешивания массива
      function shuffleArray(arr) {
        for (var i = arr.length - 1; i > 0; i--) {
          var j = Math.floor(Math.random() * (i + 1));
          var temp = arr[i];
          arr[i] = arr[j];
          arr[j] = temp;
        }
        return arr;
      }

      // Переводы слов
      var translations = {
        hello: { English: 'hello', Spanish: 'hola', French: 'bonjour', German: 'hallo' },
        goodbye: { English: 'goodbye', Spanish: 'adiós', French: 'au revoir', German: 'auf wiedersehen' },
        please: { English: 'please', Spanish: 'por favor', French: 's\'il vous plaît', German: 'bitte' },
        thanks: { English: 'thanks', Spanish: 'gracias', French: 'merci', German: 'danke' },
        yes: { English: 'yes', Spanish: 'sí', French: 'oui', German: 'ja' },
        no: { English: 'no', Spanish: 'no', French: 'non', German: 'nein' }
      };

      var words = ['hello', 'goodbye', 'please', 'thanks', 'yes', 'no'];

      // Генерация урока
      function generateLesson(level, language) {
        var levels = { beginner: 'A1', intermediate: 'B1', advanced: 'C1' };
        var lvl = levels[level] || 'B1';
        
        var vocab = [];
        for (var w = 0; w < words.length; w++) {
          vocab.push({ 
            word: words[w], 
            translation: translations[words[w]][language] || words[w]
          });
        }
        
        var theoryByLevel = {
          beginner: '📘 <strong>Основы ' + language + '</strong><br><br>В ' + language + ' базовый порядок слов — SVO.<br>Пример: "I learn ' + language + '"<br><br>✅ Артикли важны<br>✅ Глаголы спрягаются',
          intermediate: '📙 <strong>' + language + ' для среднего уровня</strong><br><br>Времена Perfect и условные предложения.<br>📌 Пример: "If I had studied, I would have passed"',
          advanced: '📕 <strong>Продвинутый ' + language + '</strong><br><br>Сослагательное наклонение, инверсии.<br>✨ Пример: "Never have I seen such a sunset"'
        };
        
        var theory = theoryByLevel[level] + '<br><br>🎯 <strong>Уровень: ' + lvl.toUpperCase() + '</strong>';
        
        var tasks = [];
        for (var i = 0; i < 20; i++) {
          var wordObj = vocab[i % vocab.length];
          if (i < 10) {
            var options = [wordObj.translation, '❌ ошибка1', '❌ ошибка2'];
            options = shuffleArray(options.slice());
            tasks.push({
              type: 'choice',
              question: '📝 Перевод слова "' + wordObj.word + '":',
              options: options,
              correct: wordObj.translation
            });
          } else {
            tasks.push({
              type: 'translate',
              question: '✍️ Переведите на ' + language + ': "' + wordObj.word + '"',
              correct: wordObj.translation.toLowerCase()
            });
          }
        }
        
        return { theory: theory, vocabulary: vocab, practice: tasks };
      }

      // Состояние
      var step = 'level';
      var userLevel = null;
      var currentLang = 'English';
      var levelAnswers = [];
      var currentLesson = null;
      var practiceAnswers = [];
      var practiceResults = [];
      var practiceIndex = 0;

      var levelQuestions = [
        { text: 'She ___ to school every day.', options: ['go', 'goes', 'going', 'went'], correct: 'goes' },
        { text: 'Синоним "быстрый"?', options: ['медленный', 'скорый', 'тихий', 'глубокий'], correct: 'скорый' },
        { text: 'Как "собака" по-английски?', options: ['cat', 'dog', 'bird', 'fish'], correct: 'dog' },
        { text: 'Время в "I have seen"?', options: ['Present Simple', 'Past Simple', 'Present Perfect', 'Future'], correct: 'Present Perfect' },
        { text: 'I am interested ___ learning.', options: ['in', 'on', 'at', 'for'], correct: 'in' }
      ];

      // Сохранение и загрузка
      function saveProgress() {
        var progress = {
          step: step,
          userLevel: userLevel,
          currentLang: currentLang,
          levelAnswers: levelAnswers,
          currentLesson: currentLesson,
          practiceAnswers: practiceAnswers,
          practiceResults: practiceResults,
          practiceIndex: practiceIndex
        };
        localStorage.setItem('aevi_progress', JSON.stringify(progress));
      }

      function loadProgress() {
        var saved = localStorage.getItem('aevi_progress');
        if (!saved) return false;
        try {
          var data = JSON.parse(saved);
          step = data.step;
          userLevel = data.userLevel;
          currentLang = data.currentLang;
          levelAnswers = data.levelAnswers || [];
          currentLesson = data.currentLesson;
          practiceAnswers = data.practiceAnswers || [];
          practiceResults = data.practiceResults || [];
          practiceIndex = data.practiceIndex || 0;
          return true;
        } catch(e) { 
          return false; 
        }
      }

      function resetProgress() {
        localStorage.removeItem('aevi_progress');
        step = 'level';
        userLevel = null;
        currentLang = 'English';
        levelAnswers = [];
        currentLesson = null;
        practiceAnswers = [];
        practiceResults = [];
        practiceIndex = 0;
        render();
      }

      // Рендер
      function render() {
        var app = document.getElementById('app');
        if (!app) return;
        
        if (step === 'level') renderLevel(app);
        else if (step === 'language') renderLanguage(app);
        else if (step === 'theory') renderTheory(app);
        else if (step === 'practice') renderPractice(app);
        
        saveProgress();
      }

      function renderLevel(container) {
        var answeredCount = levelAnswers.length;
        var currentQ = levelQuestions[answeredCount];
        
        if (!currentQ) {
          var correct = 0;
          for (var i = 0; i < levelAnswers.length; i++) {
            if (levelAnswers[i] === levelQuestions[i].correct) correct++;
          }
          if (correct <= 2) userLevel = 'beginner';
          else if (correct <= 4) userLevel = 'intermediate';
          else userLevel = 'advanced';
          step = 'language';
          render();
          return;
        }
        
        var optionsHtml = '';
        for (var o = 0; o < currentQ.options.length; o++) {
          optionsHtml += '<div class="option" data-value="' + currentQ.options[o] + '">' + currentQ.options[o] + '</div>';
        }
        
        container.innerHTML = 
          '<div class="card">' +
            '<h2>🌙 Оценка уровня</h2>' +
            '<div class="sub">Вопрос ' + (answeredCount+1) + ' из ' + levelQuestions.length + '</div>' +
            '<div class="options">' + optionsHtml + '</div>' +
            '<button class="btn" id="nextBtn">' + (answeredCount+1 === levelQuestions.length ? 'Завершить' : 'Далее') + '</button>' +
            '<div class="progress"><div class="progress-fill" style="width:' + (answeredCount/levelQuestions.length)*100 + '%"></div></div>' +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div>';
        
        var opts = document.querySelectorAll('.option');
        for (var oi = 0; oi < opts.length; oi++) {
          opts[oi].onclick = (function(el) {
            return function() {
              var allOpts = document.querySelectorAll('.option');
              for (var ao = 0; ao < allOpts.length; ao++) {
                allOpts[ao].classList.remove('selected');
              }
              el.classList.add('selected');
              levelAnswers[answeredCount] = el.getAttribute('data-value');
            };
          })(opts[oi]);
        }
        
        document.getElementById('nextBtn').onclick = function() {
          if (levelAnswers[answeredCount]) render();
        };
        
        var resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.onclick = function() {
            if (confirm('Сбросить весь прогресс?')) resetProgress();
          };
        }
      }

      function renderLanguage(container) {
        var levelNames = { beginner: 'Начинающий', intermediate: 'Средний', advanced: 'Продвинутый' };
        container.innerHTML = 
          '<div class="card">' +
            '<h2>✨ Выбери язык</h2>' +
            '<div class="sub">Твой уровень: ' + levelNames[userLevel] + '</div>' +
            '<select id="langSelect" class="lang-select">' +
              '<option value="English">🇬🇧 Английский</option>' +
              '<option value="Spanish">🇪🇸 Испанский</option>' +
              '<option value="French">🇫🇷 Французский</option>' +
              '<option value="German">🇩🇪 Немецкий</option>' +
            '</select>' +
            '<button class="btn" id="generateBtn">🚀 Сгенерировать урок</button>' +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div>';
        
        document.getElementById('langSelect').onchange = function(e) { 
          currentLang = e.target.value; 
          saveProgress(); 
        };
        document.getElementById('generateBtn').onclick = function() {
          currentLesson = generateLesson(userLevel, currentLang);
          practiceAnswers = new Array(20);
          for (var pa = 0; pa < 20; pa++) practiceAnswers[pa] = null;
          practiceResults = new Array(20);
          for (var pr = 0; pr < 20; pr++) practiceResults[pr] = false;
          practiceIndex = 0;
          step = 'theory';
          render();
        };
        var resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.onclick = function() {
            if (confirm('Сбросить весь прогресс?')) resetProgress();
          };
        }
      }

      function renderTheory(container) {
        var vocabHtml = '';
        for (var v = 0; v < currentLesson.vocabulary.length; v++) {
          vocabHtml += '<div class="word-item"><span>' + currentLesson.vocabulary[v].word + '</span><span style="color:#b0f5ff;">' + currentLesson.vocabulary[v].translation + '</span></div>';
        }
        
        container.innerHTML = 
          '<div class="card">' +
            '<h2>📖 Теория — ' + currentLang + '</h2>' +
            '<div class="sub">Уровень: ' + userLevel + '</div>' +
            '<div style="margin:20px 0; line-height:1.6;">' + currentLesson.theory + '</div>' +
            '<strong>📚 Словарь</strong>' +
            '<div class="word-list">' + vocabHtml + '</div>' +
            '<div class="button-group">' +
              '<button class="btn-small" id="backBtn">← Назад</button>' +
              '<button class="btn" id="startPracticeBtn">🎯 К практике (20 заданий)</button>' +
            '</div>' +
            '<button class="btn-small" id="resetBtn" style="margin-top:1rem;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div>';
        
        document.getElementById('backBtn').onclick = function() {
          step = 'language';
          render();
        };
        document.getElementById('startPracticeBtn').onclick = function() {
          step = 'practice';
          render();
        };
        var resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.onclick = function() {
            if (confirm('Сбросить весь прогресс?')) resetProgress();
          };
        }
      }

      function renderPractice(container) {
        var total = currentLesson.practice.length;
        var q = currentLesson.practice[practiceIndex];
        var userAnswer = practiceAnswers[practiceIndex] || '';
        var isAnswered = practiceAnswers[practiceIndex] !== null;
        
        var correctCount = 0;
        for (var rc = 0; rc < practiceResults.length; rc++) {
          if (practiceResults[rc] === true) correctCount++;
        }
        
        var html = 
          '<div class="card">' +
            '<div class="flex-between"><h2>✍️ Практика</h2><div class="score">✅ ' + correctCount + '/' + total + '</div></div>' +
            '<div class="progress"><div class="progress-fill" style="width:' + (practiceIndex/total)*100 + '%"></div></div>' +
            '<div class="practice-question">' +
              '<strong>' + (practiceIndex+1) + '/' + total + '</strong>' +
              '<p style="margin:12px 0">' + q.question + '</p>';
        
        if (q.type === 'choice') {
          html += '<div class="options" id="practiceOptions">';
          for (var optIdx = 0; optIdx < q.options.length; optIdx++) {
            var opt = q.options[optIdx];
            var selectedClass = (userAnswer === opt) ? 'selected' : '';
            html += '<div class="option ' + selectedClass + '" data-choice="' + opt.replace(/"/g, '&quot;') + '">' + opt + '</div>';
          }
          html += '</div>';
        } else {
          html += '<input type="text" id="answerInput" class="practice-input" placeholder="Ваш ответ..." value="' + userAnswer.replace(/"/g, '&quot;') + '">';
        }
        
        if (isAnswered) {
          var resultText = practiceResults[practiceIndex] ? '✓ Верно!' : '✗ Ошибка. Правильно: ' + q.correct;
          var resultClass = practiceResults[practiceIndex] ? 'correct' : 'wrong';
          html += '<div class="result-badge ' + resultClass + '">' + resultText + '</div>';
        }
        
        html += '<div style="display:flex; gap:1rem; margin-top:1rem;">' +
          '<button class="btn" id="checkBtn" style="flex:1;">' + (isAnswered ? 'Изменить' : 'Проверить') + '</button>';
        
        if (practiceIndex + 1 < total) {
          html += '<button class="btn" id="nextBtn" style="flex:1;">Далее →</button>';
        } else {
          html += '<button class="btn" id="finishBtn" style="flex:1;">🏆 Завершить</button>';
        }
        
        html += '</div>' +
          '<div style="display:flex; gap:1rem; margin-top:10px;">' +
            '<button class="btn-small" id="backToTheoryBtn" style="flex:1;">← К теории</button>' +
            '<button class="btn-small" id="exitBtn" style="flex:1;background:#ff5e7c20;color:#ff9eae;">⚠️ Выйти</button>' +
          '</div>' +
          '<button class="btn-small" id="resetBtn" style="margin-top:10px;background:#ff5e7c20;color:#ff9eae;">🔄 Сбросить всё</button>' +
          '</div></div>';
        
        container.innerHTML = html;
        
        if (q.type !== 'choice') {
          var input = document.getElementById('answerInput');
          if (input && !isAnswered) input.focus();
          if (input) {
            input.onkeypress = function(e) {
              if (e.key === 'Enter') {
                document.getElementById('checkBtn').click();
              }
            };
          }
        }
        
        if (q.type === 'choice') {
          var choiceOptions = document.querySelectorAll('#practiceOptions .option');
          for (var co = 0; co < choiceOptions.length; co++) {
            choiceOptions[co].onclick = (function(optEl) {
              return function() {
                if (isAnswered) return;
                var allOpts = document.querySelectorAll('#practiceOptions .option');
                for (var ao2 = 0; ao2 < allOpts.length; ao2++) {
                  allOpts[ao2].classList.remove('selected');
                }
                optEl.classList.add('selected');
              };
            })(choiceOptions[co]);
          }
        }
        
        document.getElementById('checkBtn').onclick = function() {
          var answer = '';
          if (q.type === 'choice') {
            var selected = document.querySelector('#practiceOptions .option.selected');
            if (!selected) return;
            answer = selected.getAttribute('data-choice');
          } else {
            var inputVal = document.getElementById('answerInput');
            if (inputVal) {
              answer = inputVal.value.trim().toLowerCase();
            }
          }
          var isCorrect = (answer === q.correct.toLowerCase());
          practiceAnswers[practiceIndex] = answer;
          practiceResults[practiceIndex] = isCorrect;
          render();
        };
        
        var nextBtn = document.getElementById('nextBtn');
        if (nextBtn) {
          nextBtn.onclick = function() {
            if (practiceAnswers[practiceIndex] !== null) {
              practiceIndex++;
              render();
            }
          };
        }
        
        var finishBtn = document.getElementById('finishBtn');
        if (finishBtn) {
          finishBtn.onclick = function() {
            var finalCount = 0;
            for (var fc = 0; fc < practiceResults.length; fc++) {
              if (practiceResults[fc] === true) finalCount++;
            }
            alert('✨ Результат: ' + finalCount + ' / 20');
            step = 'theory';
            render();
          };
        }
        
        document.getElementById('backToTheoryBtn').onclick = function() {
          step = 'theory';
          render();
        };
        
        document.getElementById('exitBtn').onclick = function() {
          if (confirm('⚠️ Выйти? Прогресс этого урока будет потерян.')) {
            practiceAnswers = new Array(20);
            for (var pea = 0; pea < 20; pea++) practiceAnswers[pea] = null;
            practiceResults = new Array(20);
            for (var per = 0; per < 20; per++) practiceResults[per] = false;
            practiceIndex = 0;
            step = 'theory';
            render();
          }
        };
        
        var resetBtn = document.getElementById('resetBtn');
        if (resetBtn) {
          resetBtn.onclick = function() {
            if (confirm('Сбросить всё?')) resetProgress();
          };
        }
      }

      // Запуск
      document.addEventListener('DOMContentLoaded', function() {
        loadProgress();
        render();
      });
    })();
  </script>
</body>
</html>
