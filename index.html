<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi Neon | Реальные уроки — 5 языков</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            color: #eef5ff;
            overflow-x: hidden;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 28px;
        }

        /* Header */
        .header {
            background: rgba(10, 12, 18, 0.75);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(0, 255, 255, 0.35);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 0;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo {
            font-size: 2rem;
            font-weight: 800;
            background: linear-gradient(135deg, #aaffff, #bc6eff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-shadow: 0 0 8px #0ff4aa;
        }

        /* языковой селектор — крутой */
        .lang-selector {
            display: flex;
            gap: 12px;
            background: rgba(0, 255, 255, 0.1);
            padding: 6px 18px;
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(0, 255, 255, 0.4);
        }

        .lang-option {
            cursor: pointer;
            padding: 5px 12px;
            border-radius: 40px;
            font-weight: 600;
            transition: 0.2s;
            color: #bbf0ff;
        }

        .lang-option.active {
            background: cyan;
            color: #0a0c12;
            box-shadow: 0 0 12px cyan;
        }

        .premium-btn {
            background: linear-gradient(105deg, #f0a34b, #ff4d6d);
            padding: 8px 24px;
            border-radius: 40px;
            color: white !important;
            font-weight: 700;
            box-shadow: 0 0 12px #ff4d6daa;
            cursor: pointer;
            transition: 0.2s;
        }

        .hero {
            padding: 50px 0 30px;
            text-align: center;
        }

        .hero h1 {
            font-size: 3.8rem;
            background: linear-gradient(125deg, #b3f0ff, #bc7aff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            margin-bottom: 16px;
        }

        .filter-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin: 30px 0 40px;
            gap: 20px;
            background: rgba(15, 20, 30, 0.6);
            padding: 12px 24px;
            border-radius: 80px;
            border: 1px solid rgba(0, 255, 200, 0.3);
        }

        .tabs {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .tab {
            background: transparent;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid rgba(0, 255, 255, 0.3);
            color: #caf0ff;
        }

        .tab.active {
            background: cyan;
            color: #0a0c12;
            border-color: cyan;
            box-shadow: 0 0 14px cyan;
        }

        .lesson-counter {
            background: #10141e;
            padding: 6px 18px;
            border-radius: 40px;
            border-left: 3px solid cyan;
        }

        .lesson-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
            gap: 28px;
            margin-bottom: 60px;
        }

        .lesson-card {
            background: rgba(18, 24, 34, 0.85);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 24px;
            transition: 0.25s;
            border: 1px solid rgba(0, 255, 255, 0.2);
            cursor: pointer;
        }

        .lesson-card:hover {
            transform: translateY(-6px);
            border-color: #0ff;
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
        }

        .lesson-level {
            font-size: 0.7rem;
            background: #0ff22a20;
            padding: 4px 12px;
            border-radius: 30px;
            border: 0.5px solid #0ff;
        }

        .premium-lock {
            color: #ffae6e;
        }

        .lesson-title {
            font-size: 1.35rem;
            font-weight: 700;
            margin: 12px 0 8px;
            background: linear-gradient(125deg, #fff, #9bc0ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        .start-btn {
            background: linear-gradient(95deg, #0066ff20, #00ccbb20);
            border: 1px solid #0ff;
            padding: 8px 16px;
            border-radius: 60px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            transition: 0.2s;
        }

        .start-btn:hover:not(:disabled) {
            background: #0ff22c;
            color: #0a0c12;
            box-shadow: 0 0 15px cyan;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: blur(10px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: #10151fe6;
            border: 1px solid #0ff;
            box-shadow: 0 0 40px rgba(0, 255, 255, 0.3);
            max-width: 600px;
            width: 90%;
            border-radius: 48px;
            padding: 32px;
        }

        .modal-close {
            float: right;
            font-size: 2rem;
            cursor: pointer;
            color: cyan;
        }

        .upgrade-button {
            background: linear-gradient(95deg, #ff884d, #ff2e5e);
            border: none;
            padding: 12px 28px;
            border-radius: 60px;
            font-weight: bold;
            cursor: pointer;
            color: white;
        }

        footer {
            border-top: 1px solid cyan;
            padding: 40px 0;
            text-align: center;
            color: #87b9dd;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <div class="nav">
            <div class="logo">Aevi<span>·LINGUA</span></div>
            <div class="lang-selector" id="langSelector">
                <div data-lang="en" class="lang-option active">🇬🇧 EN</div>
                <div data-lang="es" class="lang-option">🇪🇸 ES</div>
                <div data-lang="fr" class="lang-option">🇫🇷 FR</div>
                <div data-lang="de" class="lang-option">🇩🇪 DE</div>
                <div data-lang="it" class="lang-option">🇮🇹 IT</div>
            </div>
            <div class="premium-btn" id="upgradeNeonBtn"><i class="fas fa-gem"></i> Premium</div>
        </div>
    </div>
</header>

<main>
    <div class="container">
        <div class="hero">
            <h1><i class="fas fa-bolt"></i> Real lessons · Real fluency</h1>
            <p>100+ реальных уроков A0 на 5 языках. A0–B1 полностью бесплатно. B2–C2 в Premium.</p>
        </div>
        <div class="filter-bar">
            <div class="tabs" id="levelTabs">
                <button data-level="all" class="tab active">Все уровни</button>
                <button data-level="A0" class="tab">A0 (100 уроков)</button>
                <button data-level="A1" class="tab">A1</button>
                <button data-level="B1" class="tab">B1</button>
                <button data-level="premium" class="tab">⭐ Premium B2-C2</button>
            </div>
            <div class="lesson-counter"><i class="fas fa-graduation-cap"></i> <span id="lessonCounter">0</span></div>
        </div>
        <div class="lesson-grid" id="lessonGrid"></div>
    </div>
</main>
<footer>
    <div class="container">
        <p><i class="fas fa-globe"></i> Aevi — реальные уроки английского, испанского, французского, немецкого, итальянского</p>
    </div>
</footer>

<div id="lessonModal" class="modal">
    <div class="modal-content">
        <span class="modal-close">&times;</span>
        <h3 id="modalTitle"></h3>
        <div id="modalBody"></div>
        <button id="modalActionBtn" class="upgrade-button" style="width:100%; margin-top:20px;"></button>
    </div>
</div>

<script>
    // ======================= РЕАЛЬНЫЕ УРОКИ ПО ЯЗЫКАМ =======================
    // Для каждого языка: 20 уникальных уроков A0 (суммарно 100 уроков A0), 6 уроков A1, 8 уроков B1, премиум B2-C2.
    const languageData = {
        en: { name: "English", flag: "🇬🇧" },
        es: { name: "Español", flag: "🇪🇸" },
        fr: { name: "Français", flag: "🇫🇷" },
        de: { name: "Deutsch", flag: "🇩🇪" },
        it: { name: "Italiano", flag: "🇮🇹" }
    };

    // Реальные темы A0 — по 20 уникальных на язык (лексика + базовые фразы)
    const a0RealTopics = {
        en: ["The Alphabet & Sounds", "Greetings & Introductions", "Numbers 1-100", "Colors & Shapes", "My Family", "Everyday Objects", "Food & Drink", "Clothes & Fashion", "Weather & Seasons", "Days & Months", "Telling Time", "House & Rooms", "Animals & Pets", "Simple Verbs (to be/to have)", "Describing People", "At the Supermarket", "My Hobbies", "Transportation", "Directions & Places", "Basic Questions"],
        es: ["El Alfabeto", "Saludos Básicos", "Números 1-100", "Colores y Formas", "Mi Familia", "Objetos Cotidianos", "Comida y Bebida", "Ropa y Moda", "Clima y Estaciones", "Días y Meses", "La Hora", "La Casa", "Animales", "Verbos Ser/Estar", "Describir Personas", "En el Supermercado", "Mis Pasatiempos", "Transporte", "Direcciones", "Preguntas Básicas"],
        fr: ["L'Alphabet", "Salutations", "Les Nombres 1-100", "Couleurs", "Ma Famille", "Objets du quotidien", "Nourriture", "Vêtements", "Météo", "Jours et Mois", "L'heure", "La Maison", "Animaux", "Verbes Être/Avoir", "Décrire les gens", "Au Supermarché", "Loisirs", "Transports", "Indiquer le chemin", "Questions simples"],
        de: ["Das Alphabet", "Begrüßungen", "Zahlen 1-100", "Farben", "Meine Familie", "Alltagsgegenstände", "Essen & Trinken", "Kleidung", "Wetter & Jahreszeiten", "Tage & Monate", "Uhrzeit", "Wohnung & Haus", "Tiere", "Verben sein/haben", "Personen beschreiben", "Im Supermarkt", "Hobbys", "Verkehrsmittel", "Wegbeschreibung", "Einfache Fragen"],
        it: ["L'Alfabeto", "Saluti", "Numeri 1-100", "Colori", "La Mia Famiglia", "Oggetti Quotidiani", "Cibo e Bevande", "Abbigliamento", "Meteo e Stagioni", "Giorni e Mesi", "Che ore sono?", "La Casa", "Animali", "Verbi Essere/Avere", "Descrivere Persone", "Al Supermercato", "I Miei Hobby", "Trasporti", "Indicazioni Stradali", "Domande Base"]
    };

    // A1 реальные темы (единые для всех языков , но перевод смысловой)
    const a1Common = [
        "Past Tense Basics (I went / I ate)", "Future Plans (Going to)", "Daily Routine", "At the Restaurant", "Booking a Hotel", "Talking about Work", "Shopping & Prices", "Making Appointments"
    ];
    // B1 реальные темы
    const b1Common = [
        "Narrating Stories", "Expressing Opinions", "Conditional Sentences", "Job Interviews", "Travel Experiences", "Health & Fitness", "Media & News", "Cultural Differences"
    ];
    // Premium B2/C2 (расширенные)
    const premiumTopics = [
        { level: "B2", title: "Idioms & Slang", desc: "Master everyday expressions" },
        { level: "B2", title: "Debate & Argumentation", desc: "Structure your thoughts" },
        { level: "B2", title: "Business Communication", desc: "Emails & meetings" },
        { level: "C1", title: "Rhetoric & Persuasion", desc: "Advanced speaking" },
        { level: "C1", title: "Academic Writing", desc: "Essays & research" },
        { level: "C2", title: "Nuanced Fluency", desc: "Native-level mastery" },
        { level: "C2", title: "Cultural Subtext", desc: "Humor & references" },
        { level: "B2", title: "Negotiation Skills", desc: "Win-win strategies" },
        { level: "C1", title: "Critical Analysis", desc: "Deconstruct arguments" }
    ];

    let allLessons = [];
    // Генерация А0 (по 20 на язык = 100 уроков)
    for (let langCode of Object.keys(languageData)) {
        const topics = a0RealTopics[langCode];
        for (let i = 0; i < topics.length; i++) {
            allLessons.push({
                id: `${langCode}_A0_${i}`,
                level: "A0",
                lang: langCode,
                title: `[${languageData[langCode].flag}] A0 · ${topics[i]}`,
                description: `Real-world vocabulary: ${topics[i]}. Start speaking from day 1.`,
                premium: false,
                content: `🎯 REAL LESSON: ${topics[i]} in ${languageData[langCode].name}.\n📖 Vocabulary list, dialogues, pronunciation tips and mini-exercises. 🎧 Listen to native speaker examples.`
            });
        }
    }
    // A1 уроки (по 8 на язык)
    for (let langCode of Object.keys(languageData)) {
        for (let i = 0; i < a1Common.length; i++) {
            allLessons.push({
                id: `${langCode}_A1_${i}`,
                level: "A1",
                lang: langCode,
                title: `[${languageData[langCode].flag}] A1 · ${a1Common[i]}`,
                description: `Practical conversations: ${a1Common[i]}. Free access.`,
                premium: false,
                content: `✈️ A1 real lesson: ${a1Common[i]} in ${languageData[langCode].name}. Interactive dialogues and grammar in context. Complete with exercises.`
            });
        }
    }
    // B1 уроки (8 на язык)
    for (let langCode of Object.keys(languageData)) {
        for (let i = 0; i < b1Common.length; i++) {
            allLessons.push({
                id: `${langCode}_B1_${i}`,
                level: "B1",
                lang: langCode,
                title: `[${languageData[langCode].flag}] B1 · ${b1Common[i]}`,
                description: `Intermediate fluency: ${b1Common[i]}. Express yourself freely.`,
                premium: false,
                content: `🌍 B1 lesson: ${b1Common[i]} in ${languageData[langCode].name}. Real media excerpts, speaking prompts, writing tasks. Build confidence.`
            });
        }
    }
    // Premium уроки B2-C2 (мультиязык)
    for (let langCode of Object.keys(languageData)) {
        for (let p of premiumTopics) {
            allLessons.push({
                id: `${langCode}_prem_${p.level}_${p.title.replace(/\s/g,'')}`,
                level: p.level,
                lang: langCode,
                title: `[${languageData[langCode].flag}] ${p.level} · ${p.title} (Premium)`,
                description: p.desc,
                premium: true,
                content: `🔐 PREMIUM LESSON: ${p.title} in ${languageData[langCode].name}.\nAdvanced vocabulary, real interviews, fluency hacks, teacher feedback simulations. Upgrade to access.`
            });
        }
    }

    // Проверка: 100 уроков A0
    console.log("A0 lessons:", allLessons.filter(l => l.level === "A0").length); // должно быть 100
    console.log("Total lessons:", allLessons.length);

    let currentLang = "en";
    let currentLevelFilter = "all";
    let isPremium = false;
    
    const lessonGrid = document.getElementById("lessonGrid");
    const counterSpan = document.getElementById("lessonCounter");

    function renderLessons() {
        let filtered = allLessons.filter(lesson => {
            if (lesson.lang !== currentLang) return false;
            if (currentLevelFilter === "all") return true;
            if (currentLevelFilter === "premium") return lesson.premium === true;
            return lesson.level === currentLevelFilter;
        });
        const freeCount = filtered.filter(l => !l.premium).length;
        const total = filtered.length;
        counterSpan.innerText = `${freeCount} / ${total} free ${!isPremium ? '🔒' : '✨'}`;

        if (filtered.length === 0) {
            lessonGrid.innerHTML = `<div style="grid-column:1/-1; text-align:center; padding:60px;">🌀 No lessons for this level, change filter</div>`;
            return;
        }

        lessonGrid.innerHTML = filtered.map(lesson => {
            const locked = lesson.premium && !isPremium;
            return `
                <div class="lesson-card" data-id="${lesson.id}">
                    <div class="card-header">
                        <span class="lesson-level">${lesson.level}</span>
                        ${lesson.premium && !isPremium ? '<span class="premium-lock"><i class="fas fa-crown"></i> Premium</span>' : ''}
                    </div>
                    <div class="lesson-title">${lesson.title}</div>
                    <div class="lesson-desc" style="color:#bbd4f0; font-size:0.85rem;">${lesson.description}</div>
                    <button class="start-btn" data-id="${lesson.id}" ${locked ? 'disabled' : ''}>
                        ${locked ? '<i class="fas fa-lock"></i> Upgrade' : '<i class="fas fa-play"></i> Start lesson'}
                    </button>
                </div>
            `;
        }).join('');

        // attach events
        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const card = btn.closest('.lesson-card');
                const id = card.dataset.id;
                const lesson = allLessons.find(l => l.id === id);
                if (lesson) openModal(lesson);
            });
        });
        document.querySelectorAll('.lesson-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('start-btn')) return;
                const id = card.dataset.id;
                const lesson = allLessons.find(l => l.id === id);
                if (lesson && (!lesson.premium || isPremium)) openModal(lesson);
                else if (lesson?.premium && !isPremium) openModal(lesson);
            });
        });
    }

    // Модальное окно
    const modal = document.getElementById("lessonModal");
    const modalTitle = document.getElementById("modalTitle");
    const modalBody = document.getElementById("modalBody");
    const modalActionBtn = document.getElementById("modalActionBtn");
    const closeSpan = document.querySelector(".modal-close");

    function openModal(lesson) {
        const locked = lesson.premium && !isPremium;
        modalTitle.innerText = lesson.title;
        if (locked) {
            modalBody.innerHTML = `
                <div style="background:#221c1a; border-radius:28px; padding:24px; text-align:center;">
                    <i class="fas fa-gem" style="font-size:48px; color:#ffaa55;"></i>
                    <p style="margin:16px 0;">⭐ Этот урок требует Premium подписки (${lesson.level}).<br>Получите доступ к B2, C1, C2 и эксклюзивным материалам на всех 5 языках.</p>
                    <button id="premiumUpgradeModalBtn" class="upgrade-button">🔥 Активировать Premium</button>
                </div>
            `;
            modalActionBtn.style.display = "none";
            document.getElementById("premiumUpgradeModalBtn")?.addEventListener("click", () => {
                upgradePremium();
                closeModal();
            });
        } else {
            modalBody.innerHTML = `<p style="line-height:1.5; font-size:1rem;">${lesson.content}</p><p style="margin-top:16px;"><i class="fas fa-headphones-alt"></i> Полноценный интерактив: карточки, диктанты, разговорная практика с ИИ — в расширенной версии Aevi.</p>`;
            modalActionBtn.style.display = "block";
            modalActionBtn.innerText = "🚀 Начать тренировку";
            modalActionBtn.onclick = () => {
                alert(`✨ Открыт тренажёр: "${lesson.title}". Выполните 5 упражнений: слова, грамматика, аудирование. Успехов!`);
                closeModal();
            };
        }
        modal.style.display = "flex";
    }

    function upgradePremium() {
        if (confirm("🌟 Aevi PREMIUM 🌟\nУровни B2, C1, C2 открыты. Все уроки на 5 языках без ограничений. Цена: 590₽/мес. Активировать демо-доступ на 7 дней?")) {
            isPremium = true;
            renderLessons();
            alert("✅ Premium активирован! Теперь все уроки B2, C1, C2 доступны. Учитесь без границ.");
        }
    }

    function closeModal() { modal.style.display = "none"; }

    // Переключение языков
    document.querySelectorAll(".lang-option").forEach(el => {
        el.addEventListener("click", () => {
            document.querySelectorAll(".lang-option").forEach(opt => opt.classList.remove("active"));
            el.classList.add("active");
            currentLang = el.dataset.lang;
            renderLessons();
        });
    });

    // Фильтры уровней
    document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => {
            document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
            tab.classList.add("active");
            currentLevelFilter = tab.dataset.level;
            renderLessons();
        });
    });

    document.getElementById("upgradeNeonBtn").addEventListener("click", upgradePremium);
    closeSpan.onclick = closeModal;
    window.onclick = (e) => { if (e.target === modal) closeModal(); };

    renderLessons();
</script>
</body>
</html>
