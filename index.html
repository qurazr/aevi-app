<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Aevi — A1 English Learning</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0B0E17;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #FFFFFF;
            padding: 1rem;
        }

        .app-container {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-wrap: wrap;
            gap: 24px;
        }

        /* Левая панель */
        .topics-panel {
            flex: 2;
            min-width: 260px;
            background: rgba(18, 22, 35, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.2);
            padding: 1.5rem;
            height: fit-content;
        }

        .topics-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 1.5rem;
        }

        .tab-switch {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background: #0F1322;
            border: 1px solid #2A2F42;
            border-radius: 40px;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .tab-btn.active {
            background: #0aff9d;
            color: #0B0E17;
            border-color: #0aff9d;
        }

        .topic-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
            max-height: 60vh;
            overflow-y: auto;
            padding-right: 6px;
        }

        .topic-item {
            background: #111624;
            border-radius: 60px;
            padding: 12px 18px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            border: 1px solid #282E44;
            transition: 0.2s;
        }

        .topic-item.completed {
            background: rgba(0, 255, 157, 0.12);
            border-color: #0aff9d;
        }

        .topic-item.completed .topic-status {
            background: #0aff9d;
            color: #0B0E17;
        }

        .topic-item.active {
            border-color: #0aff9d;
            box-shadow: 0 0 12px rgba(0, 255, 157, 0.3);
            background: #1A2035;
        }

        .topic-status {
            width: 28px;
            height: 28px;
            background: #2A2F42;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
        }

        .topic-name {
            flex: 1;
            font-weight: 500;
        }

        .topic-badge {
            font-size: 11px;
            background: #00c3ff20;
            padding: 4px 10px;
            border-radius: 60px;
            color: #7df9ff;
        }

        /* Правая панель */
        .content-panel {
            flex: 5;
            min-width: 300px;
            background: rgba(12, 15, 26, 0.6);
            backdrop-filter: blur(10px);
            border-radius: 32px;
            border: 1px solid rgba(0, 255, 157, 0.25);
            padding: 1.8rem;
            max-height: 80vh;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }

        .glow-text {
            background: linear-gradient(135deg, #BFFFC7, #7DF9FF);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            font-weight: 700;
        }

        /* Кнопки */
        .btn {
            background: linear-gradient(95deg, #0aff9d, #00c3ff);
            border: none;
            padding: 12px 24px;
            border-radius: 60px;
            font-weight: 700;
            color: #0B0E17;
            cursor: pointer;
            width: 100%;
            margin-top: 1rem;
            font-size: 1rem;
            transition: 0.2s;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #0aff9d;
            color: #0aff9d;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-outline:hover {
            background: rgba(10, 255, 157, 0.1);
            transform: scale(0.98);
        }

        .btn-back {
            background: rgba(255, 94, 124, 0.15);
            border: 1px solid #ff5e7c;
            color: #ff9eae;
            padding: 10px 20px;
            border-radius: 60px;
            cursor: pointer;
            font-weight: 500;
            transition: 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 94, 124, 0.3);
            transform: scale(0.98);
        }

        .progress {
            margin: 10px 0;
            height: 6px;
            background: #1e2a32;
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #0aff9d, #00c3ff);
        }

        /* Чат */
        .chat-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100%;
            min-height: 500px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            background: #0F1322;
            border-radius: 24px;
            margin-bottom: 16px;
            max-height: 500px;
        }

        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 18px;
            max-width: 95%;
            word-wrap: break-word;
            white-space: pre-wrap;
            font-size: 0.95rem;
            line-height: 1.5;
            background: #1A2035;
            border: 1px solid #2A2F42;
            color: #fff;
        }

        .button-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 12px;
            margin-bottom: 16px;
        }

        .question-btn {
            background: #0F1322;
            border: 1px solid #0aff9d;
            border-radius: 40px;
            padding: 10px 18px;
            cursor: pointer;
            font-size: 0.85rem;
            color: #0aff9d;
            transition: 0.2s;
            font-weight: 500;
        }

        .question-btn:hover {
            background: #0aff9d20;
            transform: scale(0.95);
        }

        .header-buttons {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
            align-items: center;
        }

        @media (max-width: 780px) {
            .app-container {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="app"></div>

<script>
    // ==================== ГРАММАТИЧЕСКИЕ ТЕМЫ A1 ====================
    const grammarTopics = [
        { id: "g1", name: "Глагол TO BE (am/is/are)" }
    ];

    // ==================== ТЕОРИЯ ДЛЯ ТЕМЫ TO BE ====================
    const theoryDB = {
        "g1": {
            full: `Глагол TO BE (am/is/are)

1. Значение глагола TO BE

Глагол to be переводится как "быть, находиться, являться".
В русском языке мы часто опускаем этот глагол: "Я студент" (а не "я есть студент").
В английском языке to be обязателен: "I am a student."

2. Формы глагола TO BE в настоящем времени

Форма зависит от того, кто или что является подлежащим:

I (я) → am
He / She / It (он/она/оно) → is
You / We / They (ты/вы/мы/они) → are

Правило-запоминалка: Я am, он/она is, а для всех остальных are.

3. Утверждение (Affirmative)

I am a teacher. (Я учитель)
He is my brother. (Он мой брат)
She is beautiful. (Она красивая)
It is a cat. (Это кот)
You are my friend. (Ты мой друг)
We are students. (Мы студенты)
They are at home. (Они дома)`,
            examples: `Примеры утвердительных предложений с глаголом TO BE:

1. I am a student. (Я студент)
2. You are my best friend. (Ты мой лучший друг)
3. He is from London. (Он из Лондона)
4. She is a doctor. (Она врач)
5. It is a big house. (Это большой дом)
6. We are happy. (Мы счастливы)
7. They are at the park. (Они в парке)
8. I am hungry. (Я голоден)
9. She is tired. (Она устала)
10. They are ready. (Они готовы)`,
            negative: `Отрицание с глаголом TO BE

Чтобы построить отрицание, добавьте частицу not после формы to be.

Сокращённые формы:
I am not → I'm not
He is not → He isn't
She is not → She isn't
It is not → It isn't
You are not → You aren't
We are not → We aren't
They are not → They aren't

Примеры:
I am not tired. (Я не устал)
She is not a doctor. (Она не врач)
They are not ready. (Они не готовы)
He isn't at home. (Его нет дома)
We aren't late. (Мы не опоздали)`,
            questions: `Вопросы с глаголом TO BE

Чтобы задать вопрос, поставьте форму to be в начало предложения (перед подлежащим).

Схема: To be + подлежащее + ...?

Примеры:
Am I late? (Я опоздал?)
Are you ready? (Ты готов?)
Is she a doctor? (Она врач?)
Is he your brother? (Он твой брат?)
Are they at home? (Они дома?)
Is it cold outside? (На улице холодно?)

Короткие ответы:
Are you ready? → Yes, I am. / No, I'm not.
Is she a doctor? → Yes, she is. / No, she isn't.
Are they at home? → Yes, they are. / No, they aren't.`
        }
    };

    // Состояние
    let currentTab = "grammar";
    let currentTopic = null;
    let currentMode = "topics";
    let chatMessages = [];
    let completedTopics = JSON.parse(localStorage.getItem("aevi_completed")) || [];

    function saveCompleted() {
        localStorage.setItem("aevi_completed", JSON.stringify(completedTopics));
    }

    function selectTopic(topic) {
        currentTopic = topic;
        chatMessages = [{ role: "ai", content: `Вы выбрали тему: ${topic.name}. Нажмите на кнопку, чтобы получить информацию.` }];
        currentMode = "chat";
        renderApp();
    }

    function addAIMessage(content) {
        chatMessages.push({ role: "ai", content: content });
        renderApp();
    }

    function backToTopics() {
        currentMode = "topics";
        currentTopic = null;
        renderApp();
    }

    function getTheoryResponse(type) {
        const data = theoryDB[currentTopic.id];
        if (!data) return "Информация по этой теме будет добавлена.";
        if (type === "full") return data.full;
        if (type === "examples") return data.examples;
        if (type === "negative") return data.negative;
        if (type === "questions") return data.questions;
        return data.full;
    }

    function renderApp() {
        const container = document.getElementById('app');
        if (!container) return;

        const currentTopics = grammarTopics;
        const completedCount = currentTopics.filter(t => completedTopics.includes(t.id)).length;

        const topicListHtml = currentTopics.map((t, idx) => {
            const isCompleted = completedTopics.includes(t.id);
            const isActive = currentTopic && currentTopic.id === t.id;
            return `
                <div class="topic-item ${isCompleted ? 'completed' : ''} ${isActive ? 'active' : ''}" data-id="${t.id}">
                    <div class="topic-status">${isCompleted ? '✓' : idx+1}</div>
                    <div class="topic-name">${t.name}</div>
                    <div class="topic-badge">грамматика</div>
                </div>
            `;
        }).join('');

        let rightPanelHtml = '';

        if (currentMode === "topics") {
            rightPanelHtml = `
                <div class="chat-container">
                    <h2>Выберите тему</h2>
                    <p>Нажмите на тему слева, чтобы начать обучение.</p>
                </div>
            `;
        } else if (currentMode === "chat" && currentTopic) {
            const messagesHtml = chatMessages.map(msg => `
                <div class="message">
                    ${msg.content}
                </div>
            `).join('');
            
            rightPanelHtml = `
                <div class="chat-container">
                    <div class="header-buttons">
                        <h2>${currentTopic.name}</h2>
                        <button class="btn-outline" id="practiceBtn" style="opacity:0.5; cursor:not-allowed;" disabled>Практика (скоро)</button>
                        <button class="btn-back" id="backBtn">Назад к темам</button>
                    </div>
                    <div class="chat-messages" id="chatMessages">
                        ${messagesHtml}
                    </div>
                    <div class="button-panel">
                        <button class="question-btn" data-type="full">Теория</button>
                        <button class="question-btn" data-type="examples">Примеры</button>
                        <button class="question-btn" data-type="negative">Отрицание</button>
                        <button class="question-btn" data-type="questions">Вопросы</button>
                    </div>
                </div>
            `;
        }

        container.innerHTML = `
            <div class="topics-panel">
                <div class="topics-header">
                    <h3><span class="glow-text">Aevi</span> · A1</h3>
                </div>
                <div class="tab-switch">
                    <div class="tab-btn active" data-tab="grammar">Грамматика</div>
                    <div class="tab-btn" data-tab="vocabulary" style="opacity:0.5; cursor:not-allowed;">Лексика (скоро)</div>
                </div>
                <div class="progress"><div class="progress-fill" style="width:${(completedCount/currentTopics.length)*100}%"></div></div>
                <div class="topic-list" id="topicList">
                    ${topicListHtml}
                </div>
            </div>
            <div class="content-panel" id="rightPanel">${rightPanelHtml}</div>
        `;

        // Только грамматика активна, лексика пока заблокирована
        document.querySelectorAll('.topic-item').forEach(el => {
            const topicId = el.dataset.id;
            const topic = grammarTopics.find(t => t.id === topicId);
            if (topic) {
                el.addEventListener('click', () => selectTopic(topic));
            }
        });

        document.getElementById('backBtn')?.addEventListener('click', backToTopics);
        
        document.querySelectorAll('.question-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                const type = btn.dataset.type;
                const response = getTheoryResponse(type);
                addAIMessage(response);
            });
        });
        
        const chatMessagesDiv = document.getElementById('chatMessages');
        if (chatMessagesDiv) {
            chatMessagesDiv.scrollTop = chatMessagesDiv.scrollHeight;
        }
    }

    renderApp();
</script>
</body>
</html>
